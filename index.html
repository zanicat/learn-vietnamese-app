/* ============================== audio ============================== */

/* A genuine Vietnamese voice or nothing: an utterance with lang="vi-VN" but no
   vi voice installed gets read by the browser's default (English) voice, which
   mangles every tone. So: use a local vi-* voice if one exists, otherwise fetch
   real Vietnamese TTS from Google Translate, and on failure say so instead of
   mispronouncing. */

var viVoice = null, voiceChecked = false;
function pickVoice() {
  if (typeof speechSynthesis === "undefined") return null;
  var vs = speechSynthesis.getVoices() || [];
  for (var i = 0; i < vs.length; i++) {
    var lang = (vs[i].lang || "").toLowerCase().replace("_", "-");
    if (lang.indexOf("vi") === 0) return vs[i];
  }
  return null;
}
function localViVoice() {
  if (typeof speechSynthesis === "undefined") return null;
  if (!voiceChecked) {
    voiceChecked = true;
    viVoice = pickVoice();
    if (typeof speechSynthesis.onvoiceschanged !== "undefined") {
      speechSynthesis.onvoiceschanged = function () { viVoice = pickVoice(); };
    }
  }
  if (!viVoice) viVoice = pickVoice();
  return viVoice;
}

var ttsEl = null, ttsCache = {}, ttsCacheKeys = [], playToken = 0;
function stopSpeaking() {
  playToken++;
  if (typeof speechSynthesis !== "undefined") speechSynthesis.cancel();
  if (ttsEl) { ttsEl.pause(); ttsEl = null; }
}
function remoteTTSUrl(text, slow) {
  return "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=vi" +
    "&ttsspeed=" + (slow ? "0.24" : "1") + "&q=" + encodeURIComponent(text);
}
/* The TTS endpoint caps requests around 200 chars; split long text at
   punctuation/spaces and play the pieces back to back. */
function chunkText(text) {
  var parts = [], rest = text.trim(), seps = [". ", "! ", "? ", "; ", ", ", " "];
  while (rest.length > 190) {
    var cut = -1;
    for (var i = 0; i < seps.length && cut < 40; i++) cut = rest.lastIndexOf(seps[i], 189);
    if (cut < 40) cut = 189;
    parts.push(rest.slice(0, cut + 1).trim());
    rest = rest.slice(cut + 1).trim();
  }
  if (rest) parts.push(rest);
  return parts;
}
function speakLocal(text, slow, v) {
  var u = new SpeechSynthesisUtterance(text);
  u.voice = v;
  u.lang = v.lang || "vi-VN";
  u.rate = slow ? 0.6 : 0.92;
  speechSynthesis.speak(u);
}
function speakRemote(text, slow) {
  var chunks = chunkText(text), tok = playToken, idx = 0;
  function next() {
    if (tok !== playToken || idx >= chunks.length) return;
    var chunk = chunks[idx++];
    var key = (slow ? "s|" : "n|") + chunk;
    var a = ttsCache[key];
    if (!a) {
      a = new Audio(remoteTTSUrl(chunk, slow));
      a.preload = "auto";
      ttsCache[key] = a;
      ttsCacheKeys.push(key);
      if (ttsCacheKeys.length > 48) delete ttsCache[ttsCacheKeys.shift()];
    }
    a.onended = next;
    a.onerror = function () {
      delete ttsCache[key];
      if (tok !== playToken) return;
      var v = localViVoice();
      if (v) speakLocal(text, slow, v);
      else toast("Couldn't load Vietnamese audio — check your connection");
    };
    ttsEl = a;
    try { a.currentTime = 0; } catch (e) {}
    var p = a.play();
    if (p && typeof p.catch === "function") p.catch(function () {});
  }
  next();
}
function speak(text, slow) {
  stopSpeaking();
  var v = localViVoice();
  if (v) speakLocal(text, slow, v);
  else speakRemote(text, slow);
}

/* ============================== rendering ============================== */

function toneChipSVG(toneKey) {

}

/* ------------------------------ review tab ------------------------------ */

function buildQueue(now) {
  view.queue = dueCards(store.data.cards, now, 0).map(function (c) { return c.id; });
  view.sessionDone = 0;
}

/* strictly due + learning cards about to come back this session */
function pendingCount(now) {
  var strict = dueCards(store.data.cards, now, 0).length;
  var soonLearn = dueCards(store.data.cards, now, 15 * MIN).filter(function (c) {
    return c.state !== "review" && c.due > now;
  }).length;
  return strict + soonLearn;
}

function nextInQueue(now) {
  /* refresh: learning cards graded "again" come back within the session */
  var due = dueCards(store.data.cards, now, 0);
  var soon = dueCards(store.data.cards, now, 15 * MIN).filter(function (c) { return c.state !== "review"; });
  var pool = due.concat(soon.filter(function (c) {
    return !due.some(function (d) { return d.id === c.id; });
  }));
  return pool.length ? pool[0] : null;
}

function renderReview(practiceAhead) {
  var now = Date.now();
  var total = Object.keys(store.data.cards).length;
  if (total === 0) {
    $("#view").innerHTML = '<div class="card empty">Your deck is empty.<br><br>' +
      'Look something up in <button class="link-btn" data-goto="learn" type="button">Learn</button> or grab a starter set from ' +
      '<button class="link-btn" data-goto="packs" type="button">Packs</button> — then come back here to practice.</div>';
    return;
  }
  var card = nextInQueue(now);
  if (!card && practiceAhead) {
    var soonest = Object.keys(store.data.cards).map(function (k) { return store.data.cards[k]; })
      .sort(function (a, b) { return a.due - b.due; });
    card = soonest[0] || null;
  }
  if (!card) {
    var soonestAll = Object.keys(store.data.cards).map(function (k) { return store.data.cards[k]; })
      .sort(function (a, b) { return a.due - b.due; })[0];
    var when = soonestAll ? fmtWhen(soonestAll.due - now) : "";
    $("#view").innerHTML = '<div class="card done-banner stack">' +
      '<div class="big">Giỏi quá! 🎉</div>' +
      '<p class="sub">All caught up' + (view.sessionDone ? " — " + view.sessionDone + " reviewed" : "") +
      ".</p>" + (when ? '<p class="sub">Next card is due ' + when + ".</p>" : "") +
      '<div><button class="btn" data-act="practice-ahead" type="button">Practice ahead anyway</button></div></div>';
    return;
  }
  view.current = card.id;
  var e = entryById(card.id);
  if (!e) { /* orphaned card (custom deleted) */
    delete store.data.cards[card.id]; store.save(); renderReview(); return;
  }
  var dir = store.data.settings.dir || "ev";
  var nDue = Math.max(1, pendingCount(now));
  var front, frontLabel;
  if (dir === "ev") { front = e.en; frontLabel = "Say it in Vietnamese"; }
  else { front = e.vi; frontLabel = "What does it mean?"; }

  var html = '<div class="card review-stage">' +
    '<div class="review-count">' + nDue + " to review · " +
    '<button class="link-btn" data-act="flip-dir" type="button" title="Switch question direction">' +
    (dir === "ev" ? "EN → VI" : "VI → EN") + " ⇄</button></div>" +
    '<p class="prompt-label">' + frontLabel + "</p>" +
    '<div class="prompt-main">' + esc(front) + "</div>";
  if (dir === "ve") html += '<div style="margin-top:6px">' + audioBtnsHTML(e.vi) + "</div>";

  if (!view.revealed) {
    html += '<div style="margin-top:22px"><button class="btn primary" data-act="reveal" type="button">Show answer</button></div>' +
      '<p class="hint" style="margin-top:14px">Try to say it out loud first — that\'s where it sticks.</p>';
  } else {
    html += '<div class="answer-zone stack">' +
      '<div class="head-row"><div><div class="prompt-main" style="margin:0">' + esc(e.vi) + "</div>" +
      '<p class="prompt-sub">' + esc(e.en) + "</p></div>" + audioBtnsHTML(e.vi) + "</div>" +
      syllablesHTML(e.vi) +
      (e.ex && e.ex[0] ? '<div class="example"><div class="ex-vi">' + esc(e.ex[0]) + '</div><div class="ex-en">' + esc(e.ex[1] || "") + "</div></div>" : "") +
      "</div>";
    var pv = previewIntervals(store.data.cards[e.id], now);
    var names = ["Again", "Hard", "Good", "Easy"];
    html += '<div class="grade-row">' + names.map(function (n, i) {
      return '<button class="grade-btn" data-grade="' + i + '" type="button">' +
        '<span class="g-label">' + n + '</span><span class="g-when">' + pv[i] + "</span></button>";
    }).join("") + "</div>" +
      '<p class="hint" style="margin-top:12px">Keys: space = show · 1–4 = grade</p>';
  }
  html += "</div>";
  $("#view").innerHTML = html;
}

function fmtWhen(ms) {
  if (ms <= 0) return "now";
  if (ms < 60 * MIN) return "in " + Math.max(1, Math.round(ms / MIN)) + " min";
  if (ms < DAY) return "in about " + Math.max(1, Math.round(ms / (60 * MIN))) + " h";
  return "in " + Math.round(ms / DAY) + " day" + (Math.round(ms / DAY) > 1 ? "s" : "");
}

function gradeCurrent(g) {
  var now = Date.now();
  var card = store.data.cards[view.current];
  if (!card) return;
  rateCard(card, g, now);
  logReview(now);
  store.save();
  view.sessionDone += 1;
  view.revealed = false;
  updateChrome();
  renderReview();
}

/* ------------------------------ packs tab ------------------------------ */

function renderPacks() {
  if (view.packId) return renderPackDetail(view.packId);
  var html = '<h2 class="hero-q">No phrase in mind? Start here.</h2><div class="pack-grid">';
  DICT.packs.forEach(function (p) {
    var entries = DICT.entries.filter(function (e) { return e.pack === p.id; });
    var got = entries.filter(function (e) { return deckHas(e.id); }).length;
    html += '<button class="pack-card" data-pack="' + p.id + '" type="button">' +
      '<span class="pack-name">' + esc(p.name) + "</span>" +
      '<span class="pack-desc">' + esc(p.desc) + "</span>" +
      '<span class="pack-meta">' + got + " of " + entries.length + " in your deck</span>" +
      '<span class="pack-bar"><i style="width:' + (entries.length ? Math.round(100 * got / entries.length) : 0) + '%"></i></span>' +
      "</button>";
  });
  html += "</div>";
  $("#view").innerHTML = html;
}

function renderPackDetail(packId) {
  var p = packById(packId);
  var entries = DICT.entries.filter(function (e) { return e.pack === packId; });
  var notIn = entries.filter(function (e) { return !deckHas(e.id); });
  var html = '<button class="link-btn" data-act="packs-home" type="button">← All packs</button>' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin:10px 0 14px">' +
    "<div><h2>" + esc(p.name) + '</h2><p class="sub">' + esc(p.desc) + "</p></div>" +
    (notIn.length ? '<button class="btn small" data-act="add-pack" data-pack="' + packId + '" type="button">+ Add all (' + notIn.length + ")</button>" : '<span class="in-deck">✓ all in deck</span>') +
    "</div>";
  html += '<div class="pack-list">' + entries.map(function (e) {
    var added = deckHas(e.id);
    return '<div class="pack-row">' +
      '<button class="pr-main" data-teach-pack="' + esc(e.id) + '" type="button">' +
      '<div class="pr-vi">' + esc(e.vi) + '</div><div class="pr-en">' + esc(e.en) + "</div></button>" +
      '<button class="pr-add' + (added ? " added" : "") + '" data-add="' + esc(e.id) + '" type="button" ' +
      (added ? 'disabled aria-label="Already in deck">✓' : 'aria-label="Add to deck">+') + "</button></div>";
  }).join("") + "</div>";
  $("#view").innerHTML = html;
}

/* ------------------------------ progress tab ------------------------------ */

function renderProgress() {
  var now = Date.now();
  var cards = Object.keys(store.data.cards).map(function (k) { return store.data.cards[k]; });
  var due = dueCards(store.data.cards, now, 0).length;
  var mastered = cards.filter(function (c) { return c.ivl >= 21; }).length;
  var streak = streakDays(store.data.log, now);
  var totalReviews = Object.keys(store.data.log).reduce(function (a, k) { return a + store.data.log[k]; }, 0);

  var html = '<h2 class="hero-q">Your progress</h2>';
  html += '<div class="tile-row">' +
    tile(cards.length, "in your deck") + tile(due, "due now") +
    tile(mastered, "mastered (3wk+)") + tile(streak, streak === 1 ? "day streak" : "day streak") +
    "</div>";

  /* last 7 days of reviews */
  var days = [], maxV = 0;
  for (var i = 6; i >= 0; i--) {
    var ts = now - i * DAY;
    var v = store.data.log[dayKey(ts)] || 0;
    maxV = Math.max(maxV, v);
    days.push({ v: v, d: "SMTWTFS"[new Date(ts).getDay()], today: i === 0 });
  }
  html += '<div class="card chart-wrap" style="margin-top:14px">' +
    '<div class="chart-title">Reviews, last 7 days' + (totalReviews ? " · " + totalReviews + " all-time" : "") + "</div>" +
    '<div class="bars">' + days.map(function (d) {
      var h = maxV ? Math.max(4, Math.round(78 * d.v / maxV)) : 4;
      return '<div class="bar-col">' +
        '<span class="bar-v">' + (d.v || "") + "</span>" +
        '<span class="bar' + (d.v ? "" : " zero") + '" style="height:' + (d.v ? h : 3) + 'px" title="' + d.v + ' reviews"></span>' +
        '<span class="bar-d"' + (d.today ? ' style="font-weight:700"' : "") + ">" + d.d + "</span></div>";
    }).join("") + "</div><hr class=\"baseline\"></div>";

  /* tricky words */
  var tricky = cards.filter(function (c) { return c.lapses > 0; })
    .sort(function (a, b) { return b.lapses - a.lapses; }).slice(0, 5);
  if (tricky.length) {
    html += '<div class="card" style="margin-top:14px"><p class="eyebrow">Worth another look</p><div class="word-list-mini">' +
      tricky.map(function (c) {
        var e = entryById(c.id);
        if (!e) return "";
        return '<div class="wl-row"><span class="wl-vi">' + esc(e.vi) + '</span><span class="wl-stage">forgotten ' +
          c.lapses + "×</span></div>";
      }).join("") + "</div></div>";
  }
  if (cards.length) {
    var recent = cards.sort(function (a, b) { return b.added - a.added; }).slice(0, 5);
    html += '<div class="card" style="margin-top:14px"><p class="eyebrow">Recently added</p><div class="word-list-mini">' +
      recent.map(function (c) {
        var e = entryById(c.id);
        if (!e) return "";
        var stage = c.state === "review" ? "every " + c.ivl + "d" : "learning";
        return '<div class="wl-row"><span class="wl-vi">' + esc(e.vi) + '</span>' +
          '<span style="flex:1;color:var(--ink-2);font-size:13px">' + esc(e.en) + "</span>" +
          '<span class="wl-stage">' + stage + "</span></div>";
      }).join("") + "</div></div>";
  }
  html += '<p class="footnote" style="margin-top:22px"><button data-act="reset-all" type="button">Erase all progress</button></p>';
  $("#view").innerHTML = html;
}

function tile(num, label) {
  return '<div class="tile"><div class="t-num">' + num + '</div><div class="t-label">' + esc(label) + "</div></div>";
}

/* ------------------------------ modals ------------------------------ */

function openModal(html) {
  $("#modal-root").innerHTML = '<div class="modal-scrim"><div class="modal" role="dialog" aria-modal="true">' + html + "</div></div>";
  $(".modal-scrim").addEventListener("click", function (ev) {
    if (ev.target === this) closeModal();
  });
}
function closeModal() { $("#modal-root").innerHTML = ""; }

function toneGuideHTML() {
  var south = accent() === "south";
  var rows = TONE_ORDER.map(function (k) {
    var t = toneInfo(k), demo = TONE_DEMO[k];
    return '<div class="tone-row">' +
      '<div><div class="tone-word">' + demo[0] + '</div><div style="text-align:center;font-size:11px;color:var(--muted)">' + esc(demo[1]) + "</div></div>" +
      '<div style="text-align:center">' + toneChipSVG(k) + '<div style="font-size:11px;color:var(--muted)">' + t.vn + "</div></div>" +
      '<div class="tone-desc"><strong>' + t.vn + " · " + t.en + "</strong> — " + esc(t.how) +
      ' <button class="link-btn play-mini" data-say="' + demo[0] + '" type="button">▸ hear</button></div>' +
      "</div>";
  }).join("");
  var consonants = south
    ? "<p><strong>đ</strong> = d · plain <strong>d</strong> and <strong>gi</strong> = “y” as in <em>yes</em> · <strong>r</strong> = r (often lightly curled) · " +
      "<strong>s</strong> = “sh”-ish, <strong>x</strong> = plain s · <strong>tr</strong> = a curled “tr”, <strong>ch</strong> = ch · <strong>ph</strong> = f · <strong>kh</strong> = throaty k (Bach) · " +
      "<strong>ng</strong> = “ng” in <em>singing</em> — fine at the start of words · <strong>nh</strong> = “ny” in <em>canyon</em>.</p>" +
      "<p>Southern habit worth knowing: a final <strong>-n</strong> often drifts toward “-ng” (ăn ≈ “ang”) and a final <strong>-t</strong> toward “-k”. " +
      "The guides here keep the standard spelling-based endings — you'll be understood either way.</p>"
    : "<p><strong>đ</strong> = d (plain <strong>d</strong> is “z”!) · <strong>gi</strong> and <strong>r</strong> = “z” too · <strong>ph</strong> = f · <strong>x</strong> and <strong>s</strong> = s · " +
      "<strong>tr</strong> and <strong>ch</strong> = ch · <strong>kh</strong> = throaty k (Bach) · " +
      "<strong>ng</strong> = “ng” in <em>singing</em> — fine at the start of words · <strong>nh</strong> = “ny” in <em>canyon</em>.</p>";
  var nsPara = south
    ? "<p><strong>North vs South:</strong> you're learning Saigon (southern) pronunciation. In Hanoi, <strong>d/gi/r</strong> all sound like “z”, " +
      "<strong>s</strong> = plain s, <strong>tr</strong> = ch, and hỏi/ngã are two distinct tones. Everyone will understand you either way.</p>"
    : "<p><strong>North vs South:</strong> you're learning Hanoi (northern) pronunciation. In Saigon, <strong>d/gi</strong> sound like “y”, <strong>r</strong> like r, " +
      "<strong>s</strong> like “sh”, <strong>tr</strong> keeps its r-color, and the hỏi and ngã tones merge into one dipping tone. Everyone will understand you either way.</p>";
  var audioNote = south
    ? "<p><strong>About the audio:</strong> the ▸ play buttons use the only free Vietnamese voice on the web, and it speaks with a <em>Hanoi</em> accent — " +
      "you'll hear “z” where the guides say “y”, and it keeps hỏi and ngã distinct. The tones, vowels and rhythm still transfer; " +
      "where the audio and the written guide disagree (d, gi, r, s, tr, ngã), trust the written guide.</p>"
    : "";
  return '<div class="modal-head"><div><h2>The six tones</h2>' +
    '<p class="sub">Same letters, different melody, completely different word. ' +
    "The mark on the vowel tells you which melody to sing.</p>" +
    '<p class="sub" style="margin-top:6px">Showing <strong>' + ACCENT_NAME[accent()] + "</strong> pronunciation · " +
    '<button class="link-btn" data-act="flip-accent" type="button">switch to ' + (south ? "Hanoi" : "Saigon") + "</button></p></div>" +
    '<button class="modal-close" data-act="close-modal" aria-label="Close" type="button">×</button></div>' +
    '<div class="tone-table">' + rows + "</div>" +
    '<p class="sub" style="margin-top:14px"><button class="link-btn" data-say="ma, má, mà, mả, mã, mạ" type="button">▸ Hear all six in a row</button></p>' +
    '<hr class="divider">' +
    "<h3>Sounds that surprise English speakers</h3>" +
    '<div class="note-box" style="margin-top:8px">' +
    "<p><strong>ư</strong> — say “oo” but smile while you do it (lips flat). · <strong>ơ</strong> — “uh” as in “fur”, no r. · " +
    "<strong>â</strong> is a quick “uh”, <strong>ă</strong> a quick “ah”. · <strong>ê</strong> = “ay”, <strong>ô</strong> = “oh”, <strong>o</strong> = “aw”.</p>" +
    consonants + nsPara + audioNote +
    "</div>";
}

function customCardHTML(prefill) {
  return '<div class="modal-head"><div><h2>Make your own card</h2>' +
    '<p class="sub">Tones and pronunciation are worked out automatically from the Vietnamese spelling.</p></div>' +
    '<button class="modal-close" data-act="close-modal" aria-label="Close" type="button">×</button></div>' +
    '<form id="custom-form">' +
    '<div class="field"><label for="cf-vi">Vietnamese (with accent marks)</label>' +
    '<input id="cf-vi" required value="' + esc(prefill.vi || "") + '" placeholder="e.g. chúc mừng"></div>' +
    '<div class="field"><label for="cf-en">Meaning in English</label>' +
    '<input id="cf-en" required value="' + esc(prefill.en || "") + '" placeholder="e.g. congratulations"></div>' +
    '<div class="field"><label for="cf-note">Note to self (optional)</label>' +
    '<input id="cf-note" placeholder="where you heard it, who taught you…"></div>' +
    '<button class="btn primary" type="submit">Add to my deck</button></form>';
}

/* ------------------------------ chrome ------------------------------ */

function updateChrome() {
  var now = Date.now();
  var due = pendingCount(now);
  var badge = $("#due-badge");
  if (badge) badge.textContent = due > 0 ? String(due) : "";
  var ab = $("#accent-btn");
  if (ab) ab.textContent = "Accent: " + accentShort();
  var streak = streakDays(store.data.log, now);
  var chip = $("#streak-chip");
  if (chip) {
    if (streak > 0) {
      chip.hidden = false;
      chip.innerHTML = "<strong>" + streak + "</strong> day" + (streak > 1 ? "s" : "") + " in a row 🔥";
    } else chip.hidden = true;
  }
}

function setTab(tab) {
  view.tab = tab;
  view.revealed = false;
  if (tab !== "packs") view.packId = null;
  $$(".tab-btn").forEach(function (b) {
    b.setAttribute("aria-selected", b.getAttribute("data-tab") === tab ? "true" : "false");
  });
  render();
}

function render() {
  updateChrome();
  if (view.tab === "learn") renderLearn();
  else if (view.tab === "review") renderReview(false);
  else if (view.tab === "packs") renderPacks();
  else renderProgress();
}

/* ------------------------------ actions ------------------------------ */

function addToDeck(entryId, silent) {
  if (store.data.cards[entryId]) return false;
  store.data.cards[entryId] = newCard(entryId, Date.now());
  store.save();
  updateChrome();
  if (!silent) toast("Added — it'll come up in Review");
  return true;
}

function handleClick(ev) {
  var el = ev.target.closest ? ev.target.closest("button") : null;
  if (!el) return;
  var act = el.getAttribute("data-act");

  if (el.hasAttribute("data-say")) { speak(el.getAttribute("data-say"), el.getAttribute("data-slow") === "1"); return; }
  if (el.hasAttribute("data-tab")) { setTab(el.getAttribute("data-tab")); return; }
  if (el.hasAttribute("data-goto")) { setTab(el.getAttribute("data-goto")); return; }
  if (el.hasAttribute("data-try")) {
    view.query = el.getAttribute("data-try");
    submitSearch(view.query);
    return;
  }
  if (el.hasAttribute("data-teach")) {
    view.teachId = el.getAttribute("data-teach");
    renderLearn();
    return;
  }
  if (el.hasAttribute("data-teach-pack")) {
    view.teachId = el.getAttribute("data-teach-pack");
    view.query = "";
    setTab("learn");
    return;
  }
  if (!act && el.hasAttribute("data-pack")) { view.packId = el.getAttribute("data-pack"); renderPacks(); return; }
  if (el.hasAttribute("data-add")) {
    addToDeck(el.getAttribute("data-add"));
    renderPacks();
    return;
  }
  if (el.hasAttribute("data-tone")) { openModal(toneGuideHTML()); return; }

  if (!act) return;
  switch (act) {
    case "add-card":
      addToDeck(el.getAttribute("data-id"));
      render();
      break;
    case "back":
      view.teachId = null;
      renderLearn();
      var inp = $("#search-input"); if (inp) inp.focus();
      break;
    case "tone-guide": openModal(toneGuideHTML()); break;
    case "close-modal": closeModal(); break;
    case "custom-card":
      openModal(customCardHTML({ vi: el.getAttribute("data-vi") || "", en: el.getAttribute("data-en") || "" }));
      var form = $("#custom-form");
      form.addEventListener("submit", function (e2) {
        e2.preventDefault();
        var vi = $("#cf-vi").value.trim(), en = $("#cf-en").value.trim(), note = $("#cf-note").value.trim();
        if (!vi || !en) return;
        var id = "c-" + Date.now();
        store.data.custom[id] = { id: id, vi: vi, en: en, pack: "custom", ex: null, note: note || null };
        store.save();
        rebuildIndex();
        addToDeck(id, true);
        closeModal();
        view.teachId = id; view.query = "";
        renderLearn();
        toast("Saved to your deck");
      });
      break;
    case "reveal": view.revealed = true; renderReview(false); break;
    case "flip-accent":
      store.data.settings.accent = accent() === "south" ? "north" : "south";
      store.save();
      if ($("#modal-root .tone-table")) openModal(toneGuideHTML());
      render();
      toast("Now teaching " + ACCENT_NAME[accent()] + " pronunciation");
      break;
    case "flip-dir":
      store.data.settings.dir = (store.data.settings.dir === "ve") ? "ev" : "ve";
      store.save();
      renderReview(false);
      break;
    case "practice-ahead": renderReview(true); break;
    case "add-pack":
      var pid = el.getAttribute("data-pack");
      var n = 0;
      DICT.entries.filter(function (e3) { return e3.pack === pid; }).forEach(function (e3) {
        if (addToDeck(e3.id, true)) n++;
      });
      toast("Added " + n + " cards");
      renderPacks();
      break;
    case "reset-all":
      if (typeof confirm === "undefined" || confirm("Erase your whole deck and all review history? This cannot be undone.")) {
        store.data = { cards: {}, custom: {}, log: {}, settings: { dir: "ev", accent: "south" } };
        store.save();
        rebuildIndex();
        setTab("learn");
        toast("Fresh start");
      }
      break;
  }
  if (el.hasAttribute("data-grade")) { /* handled below */ }
}

function handleGrade(ev) {
  var el = ev.target.closest ? ev.target.closest(".grade-btn") : null;
  if (!el) return;
  gradeCurrent(parseInt(el.getAttribute("data-grade"), 10));
}

function handleKeys(ev) {
  if (view.tab !== "review") return;
  var tag = (ev.target.tagName || "").toLowerCase();
  if (tag === "input" || tag === "textarea") return;
  if (ev.key === " " && !view.revealed && view.current) {
    ev.preventDefault(); view.revealed = true; renderReview(false);
  } else if (view.revealed && ["1", "2", "3", "4"].indexOf(ev.key) >= 0) {
    gradeCurrent(parseInt(ev.key, 10) - 1);
  }
}

/* ------------------------------ boot ------------------------------ */

function boot() {
  var dataEl = document.getElementById("dict-data");
  DICT = JSON.parse(dataEl.textContent);
  store.load();
  rebuildIndex();
  document.addEventListener("click", function (ev) { handleClick(ev); handleGrade(ev); });
  document.addEventListener("keydown", handleKeys);
  var tg = document.getElementById("tone-guide-link");
  if (tg) tg.addEventListener("click", function () { openModal(toneGuideHTML()); });
  setTab("learn");
}

if (typeof document !== "undefined" && document.getElementById) {
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
}

/* expose internals for tests (harmless in browser) */
if (typeof module !== "undefined" && module.exports) {
  module.exports = { TONES, TONE_MAP, toneInfo, accent, store, detone, analyzeSyllable, analyzePhrase,
    isVietnameseText, norm, buildIndex, searchEntries, newCard, rateCard,
    previewIntervals, dueCards, streakDays, respellRime, dayKey };
}

</script>
