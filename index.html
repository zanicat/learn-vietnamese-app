<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- The Google Translate TTS endpoint 404s any request carrying a cross-site
     Referer, and <audio> has no per-element referrerpolicy, so suppress the
     header page-wide or remote audio breaks everywhere except file://. -->
<meta name="referrer" content="no-referrer">
<title>Từng từ — Vietnamese, word by word</title>
<style>
  /* ============ Porcelain & Lacquer ============
     Warm porcelain ground, tea-green ink, lacquer red for the one action
     that matters, jade for progress, gold for celebration. Charter serif
     carries the Vietnamese; the UI stays quiet in system sans. */
  :root {
    --paper: #F7F4EC;
    --card: #FEFCF6;
    --card-2: #EFEAE0;
    --ink: #2B3230;
    --ink-2: #5F6B64;
    --muted: #93998F;
    --line: #E7E2D4;
    --accent: #B4452E;
    --on-accent: #FFF7F0;
    --accent-wash: rgba(180, 69, 46, 0.08);
    --jade: #337F63;
    --jade-wash: rgba(51, 127, 99, 0.10);
    --gold: #C08A2D;
    --gold-wash: rgba(192, 138, 45, 0.13);
    --shadow: 0 1px 2px rgba(43, 50, 48, 0.04), 0 6px 24px rgba(43, 50, 48, 0.06);
    --t-ngang: #2a78d6; --t-sac: #1baf7a; --t-huyen: #eda100;
    --t-hoi: #008300; --t-nga: #4a3aa7; --t-nang: #e34948;
    --bar: #337F63;
    --grade-again: #C43D3D; --grade-hard: #C0742A; --grade-good: #337F63; --grade-easy: #3B77C2;
    --serif: Charter, "Bitstream Charter", "Sitka Text", Cambria, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #161916; --card: #1E221F; --card-2: #262B27;
      --ink: #ECE8DC; --ink-2: #A9B3A6; --muted: #798474; --line: #30362F;
      --accent: #E07B5A; --on-accent: #221310; --accent-wash: rgba(224, 123, 90, 0.12);
      --jade: #6FBF9C; --jade-wash: rgba(111, 191, 156, 0.13);
      --gold: #D9A84E; --gold-wash: rgba(217, 168, 78, 0.14);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 24px rgba(0, 0, 0, 0.25);
      --t-ngang: #3987e5; --t-sac: #199e70; --t-huyen: #c98500;
      --t-hoi: #3da13d; --t-nga: #9085e9; --t-nang: #e66767;
      --bar: #6FBF9C;
      --grade-again: #e05c5c; --grade-hard: #d98a4a; --grade-good: #6FBF9C; --grade-easy: #6FA7E8;
    }
  }
  :root[data-theme="light"] {
    --paper: #F7F4EC; --card: #FEFCF6; --card-2: #EFEAE0;
    --ink: #2B3230; --ink-2: #5F6B64; --muted: #93998F; --line: #E7E2D4;
    --accent: #B4452E; --on-accent: #FFF7F0; --accent-wash: rgba(180, 69, 46, 0.08);
    --jade: #337F63; --jade-wash: rgba(51, 127, 99, 0.10);
    --gold: #C08A2D; --gold-wash: rgba(192, 138, 45, 0.13);
    --shadow: 0 1px 2px rgba(43, 50, 48, 0.04), 0 6px 24px rgba(43, 50, 48, 0.06);
    --t-ngang: #2a78d6; --t-sac: #1baf7a; --t-huyen: #eda100;
    --t-hoi: #008300; --t-nga: #4a3aa7; --t-nang: #e34948;
    --bar: #337F63;
    --grade-again: #C43D3D; --grade-hard: #C0742A; --grade-good: #337F63; --grade-easy: #3B77C2;
  }
  :root[data-theme="dark"] {
    --paper: #161916; --card: #1E221F; --card-2: #262B27;
    --ink: #ECE8DC; --ink-2: #A9B3A6; --muted: #798474; --line: #30362F;
    --accent: #E07B5A; --on-accent: #221310; --accent-wash: rgba(224, 123, 90, 0.12);
    --jade: #6FBF9C; --jade-wash: rgba(111, 191, 156, 0.13);
    --gold: #D9A84E; --gold-wash: rgba(217, 168, 78, 0.14);
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 24px rgba(0, 0, 0, 0.25);
    --t-ngang: #3987e5; --t-sac: #199e70; --t-huyen: #c98500;
    --t-hoi: #3da13d; --t-nga: #9085e9; --t-nang: #e66767;
    --bar: #6FBF9C;
    --grade-again: #e05c5c; --grade-hard: #d98a4a; --grade-good: #6FBF9C; --grade-easy: #6FA7E8;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; cursor: pointer; background: none; border: none; padding: 0; }
  button:focus-visible, input:focus-visible, a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 6px;
  }
  input { font: inherit; color: inherit; }

  #app {
    max-width: 620px; margin: 0 auto;
    padding: 0 20px calc(92px + env(safe-area-inset-bottom, 0px));
  }
  @media (min-width: 640px) { #app { padding-bottom: 56px; } }

  /* ---------- header ---------- */
  .top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 2px 14px; gap: 12px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; min-width: 0; }
  .brand-vi { font-family: var(--serif); font-size: 25px; font-weight: 700; letter-spacing: -0.01em; }
  .brand-vi .dot { color: var(--accent); }
  .brand-sub { font-size: 12.5px; color: var(--muted); }
  @media (max-width: 400px) { .brand-sub { display: none; } }
  .streak-chip {
    font-size: 13px; color: var(--ink-2); white-space: nowrap; flex: none;
    padding: 4px 12px; border: 1px solid transparent; border-radius: 999px;
    background: var(--gold-wash);
  }
  .streak-chip strong { color: var(--gold); font-variant-numeric: tabular-nums; }

  /* ---------- navigation ----------
     Phones: fixed bottom bar, thumb reach. ≥640px: centered pill row. */
  .bottomnav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    display: flex; justify-content: center; gap: 0;
    background: var(--card); border-top: 1px solid var(--line);
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom, 0px));
  }
  .nav-btn {
    position: relative; flex: 1; max-width: 92px; min-width: 0;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 5px 2px 4px; border-radius: 12px;
    color: var(--muted); font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em;
  }
  .nav-btn svg { width: 22px; height: 22px; flex: none; }
  .nav-btn[aria-selected="true"] { color: var(--accent); }
  .due-badge {
    position: absolute; top: -1px; left: calc(50% + 6px);
    min-width: 17px; height: 17px; padding: 0 4px; border-radius: 999px;
    background: var(--accent); color: var(--on-accent);
    font-size: 10.5px; font-weight: 700; line-height: 17px; text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .due-badge:empty { display: none; }
  @media (min-width: 640px) {
    .bottomnav {
      position: static; width: fit-content; margin: 0 auto 24px;
      border: 1px solid var(--line); border-radius: 999px;
      padding: 5px; gap: 2px; box-shadow: var(--shadow);
    }
    .nav-btn {
      flex-direction: row; gap: 7px; max-width: none;
      font-size: 13.5px; padding: 7px 15px; border-radius: 999px;
    }
    .nav-btn svg { width: 16px; height: 16px; }
    .nav-btn[aria-selected="true"] { background: var(--accent-wash); }
    .due-badge { position: static; margin-left: 4px; }
  }

  /* ---------- generic ---------- */
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 18px; padding: 22px; box-shadow: var(--shadow);
  }
  .stack > * + * { margin-top: 16px; }
  h2 { font-family: var(--serif); font-size: 21px; margin: 0 0 4px; text-wrap: balance; letter-spacing: -0.01em; }
  h3 { font-size: 15.5px; margin: 0; }
  .sub { color: var(--ink-2); font-size: 14.5px; margin: 0; }
  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 6px;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    border-radius: 12px; padding: 10px 18px; font-size: 15px; font-weight: 600;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    transition: transform 0.06s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
  .btn.small { padding: 7px 13px; font-size: 13.5px; border-radius: 10px; }
  .btn[disabled] { opacity: 0.45; cursor: default; }
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .link-btn { color: var(--accent); font-weight: 600; font-size: 14px; }
  .icon { width: 17px; height: 17px; flex: none; }

  /* page header for sub-views: back button + title on one calm line */
  .page-head { display: flex; align-items: flex-start; gap: 12px; margin: 2px 0 16px; }
  .page-head .ph-main { flex: 1; min-width: 0; }
  .page-head h2 { margin-bottom: 2px; }
  .back-btn {
    flex: none; width: 38px; height: 38px; border-radius: 999px; margin-top: 2px;
    border: 1px solid var(--line); background: var(--card); color: var(--ink-2);
    display: inline-flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* session shell: lesson & scenario screens share this chrome */
  .session-bar { display: flex; align-items: center; gap: 12px; margin: 6px 0 6px; }
  .session-track { flex: 1; height: 6px; border-radius: 3px; background: var(--card-2); overflow: hidden; }
  .session-fill { display: block; height: 100%; border-radius: 3px; background: var(--jade); transition: width 0.25s ease; }
  .session-x {
    flex: none; width: 36px; height: 36px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--card); color: var(--muted);
    display: inline-flex; align-items: center; justify-content: center; font-size: 17px; line-height: 1;
  }
  .session-x:hover { color: var(--accent); border-color: var(--accent); }
  .session-eyebrow { margin: 0 0 14px; }
  .session-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 16px; }
  .session-nav .btn { min-width: 110px; }

  /* ---------- learn / search ---------- */
  .hero-q {
    font-family: var(--serif); font-size: 22px; font-weight: 700; margin: 6px 0 14px;
    text-wrap: balance; letter-spacing: -0.01em;
  }
  .search-row { display: flex; gap: 8px; }
  .search-row input {
    flex: 1; min-width: 0; background: var(--card); border: 1.5px solid var(--line);
    border-radius: 14px; padding: 12px 18px; font-size: 16.5px;
  }
  .search-row input::placeholder { color: var(--muted); }
  .search-row input:focus { border-color: var(--accent); outline: none; }
  .hint { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .try-chip {
    font-size: 13.5px; padding: 6px 13px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--card); color: var(--ink-2);
  }
  .try-chip:hover { border-color: var(--accent); color: var(--ink); }

  .result-list { display: flex; flex-direction: column; gap: 8px; }
  .result-item {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    text-align: left; width: 100%;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 13px 18px;
  }
  .result-item:hover { border-color: var(--accent); }
  .result-item .vi { font-family: var(--serif); font-size: 18px; font-weight: 700; }
  .result-item .en { color: var(--ink-2); font-size: 14px; text-align: right; }

  /* ---------- composed phrases ---------- */
  .piece-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .piece-chip {
    display: inline-flex; flex-direction: column; align-items: flex-start; gap: 1px;
    text-align: left; padding: 7px 12px; border-radius: 12px;
    border: 1px dashed var(--line); background: var(--card); color: var(--ink);
  }
  button.piece-chip:hover { border-color: var(--accent); }
  .piece-chip .vi { font-family: var(--serif); font-size: 15.5px; font-weight: 700; }
  .piece-chip .en { font-size: 11.5px; color: var(--muted); }
  .piece-plus { color: var(--muted); font-weight: 700; }

  /* ---------- word card ---------- */
  .word-card .headword {
    font-family: var(--serif); font-size: 34px; font-weight: 700; line-height: 1.25;
    letter-spacing: -0.01em; margin: 2px 0 0; text-wrap: balance;
  }
  .word-card .gloss { font-size: 17px; color: var(--ink-2); margin: 3px 0 0; }
  .word-card .lit { font-size: 13.5px; color: var(--muted); font-style: italic; margin-top: 3px; }
  .head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .audio-btns { display: flex; gap: 6px; flex: none; margin-top: 6px; }
  .audio-btn {
    width: 42px; height: 42px; border-radius: 999px; border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--card-2); color: var(--ink-2);
  }
  .audio-btn:hover { color: var(--accent); border-color: var(--accent); }
  .audio-btn.slow { font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; }

  .syllables { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .syl {
    border: 1px solid var(--line); border-radius: 14px; padding: 10px 12px 9px;
    background: var(--card-2); text-align: center; min-width: 78px;
  }
  .syl .syl-vi { font-family: var(--serif); font-size: 20px; font-weight: 700; line-height: 1.2; }
  .syl .syl-say { font-size: 13px; color: var(--ink-2); margin-top: 1px; }
  .syl .syl-tone {
    display: inline-flex; align-items: center; gap: 5px; margin-top: 7px;
    font-size: 11.5px; font-weight: 600; color: var(--ink-2);
    border-radius: 999px; padding: 2px 8px 2px 5px;
    border: 1px solid var(--line); background: var(--card);
  }
  .syl .syl-tone svg { display: block; }

  .example {
    border-left: 3px solid var(--jade); background: var(--jade-wash);
    border-radius: 0 12px 12px 0; padding: 11px 15px;
  }
  .example .ex-vi { font-family: var(--serif); font-size: 17px; font-weight: 600; }
  .example .ex-en { font-size: 14px; color: var(--ink-2); margin-top: 1px; }
  .note-box { font-size: 14px; color: var(--ink-2); }
  .note-box strong { color: var(--ink); }
  .word-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .in-deck { color: var(--jade); font-size: 14px; font-weight: 600; display: inline-flex; gap: 6px; align-items: center; }

  /* ---------- tone guide ---------- */
  .tone-table { display: flex; flex-direction: column; gap: 10px; }
  .tone-row {
    display: grid; grid-template-columns: 64px 56px 1fr; gap: 12px; align-items: center;
    border: 1px solid var(--line); border-radius: 14px; padding: 10px 14px; background: var(--card);
  }
  .tone-row .tone-word { font-family: var(--serif); font-size: 24px; font-weight: 700; text-align: center; }
  .tone-row .tone-desc { font-size: 13.5px; color: var(--ink-2); }
  .tone-row .tone-desc strong { color: var(--ink); font-size: 14px; }
  .tone-row .play-mini { color: var(--muted); }
  .tone-row .play-mini:hover { color: var(--accent); }

  /* ---------- review / practice stage ---------- */
  .review-stage { text-align: center; padding: 30px 20px 24px; }
  .review-count { font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; letter-spacing: 0.06em; }
  .prompt-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 16px; }
  .prompt-main { font-family: var(--serif); font-size: 30px; font-weight: 700; margin: 8px 0 2px; text-wrap: balance; line-height: 1.3; }
  .prompt-sub { color: var(--ink-2); font-size: 15px; }
  .answer-zone { margin-top: 20px; border-top: 1px dashed var(--line); padding-top: 20px; text-align: left; }
  .grade-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 22px; }
  .grade-btn {
    border-radius: 12px; padding: 11px 4px 9px; border: 1px solid var(--line);
    background: var(--card); display: flex; flex-direction: column; gap: 1px; align-items: center;
  }
  .grade-btn .g-label { font-weight: 700; font-size: 14.5px; }
  .grade-btn .g-when { font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .grade-btn[data-grade="0"] .g-label { color: var(--grade-again); }
  .grade-btn[data-grade="1"] .g-label { color: var(--grade-hard); }
  .grade-btn[data-grade="2"] .g-label { color: var(--grade-good); }
  .grade-btn[data-grade="3"] .g-label { color: var(--grade-easy); }
  .grade-btn:hover { border-color: var(--muted); }
  .done-banner { text-align: center; padding: 34px 22px; }
  .done-banner .big { font-family: var(--serif); font-size: 27px; font-weight: 700; }
  .done-banner.celebrate { background: linear-gradient(180deg, var(--gold-wash), transparent 65%), var(--card); }

  .quiz-check { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
  .quiz-check .btn.miss { color: var(--grade-again); }

  /* ---------- packs ---------- */
  .pack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { .pack-grid { grid-template-columns: 1fr; } }
  .pack-card {
    text-align: left; border: 1px solid var(--line); border-radius: 16px;
    padding: 17px 18px; background: var(--card); display: flex; flex-direction: column; gap: 4px;
  }
  .pack-card:hover { border-color: var(--accent); }
  .pack-card .pack-name { font-weight: 700; font-size: 15.5px; }
  .pack-card .pack-desc { font-size: 13px; color: var(--ink-2); }
  .pack-card .pack-meta { font-size: 12px; color: var(--muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .pack-card .pack-bar { height: 4px; border-radius: 2px; background: var(--card-2); overflow: hidden; margin-top: 4px; }
  .pack-card .pack-bar i { display: block; height: 100%; background: var(--jade); border-radius: 2px; }

  .pack-list { display: flex; flex-direction: column; gap: 8px; }
  .pack-row {
    display: flex; align-items: center; gap: 12px;
    border: 1px solid var(--line); border-radius: 14px; padding: 10px 15px; background: var(--card);
  }
  .pack-row .pr-main { flex: 1; min-width: 0; text-align: left; }
  .pack-row .pr-vi { font-family: var(--serif); font-size: 17px; font-weight: 700; }
  .pack-row .pr-en { font-size: 13.5px; color: var(--ink-2); }
  .pack-row .pr-add {
    flex: none; width: 34px; height: 34px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--ink-2);
    display: inline-flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 600;
  }
  .pack-row .pr-add:hover { color: var(--accent); border-color: var(--accent); }
  .pack-row .pr-add.added { color: var(--jade); border-color: transparent; background: var(--jade-wash); cursor: default; }

  /* ---------- progress ---------- */
  .tile-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 520px) { .tile-row { grid-template-columns: 1fr 1fr; } }
  .tile { border: 1px solid var(--line); border-radius: 14px; padding: 13px 15px; background: var(--card); }
  .tile .t-num { font-family: var(--serif); font-size: 26px; font-weight: 700; line-height: 1.15; }
  .tile .t-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .chart-wrap { margin-top: 6px; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 8px; }
  .bars { display: flex; align-items: flex-end; gap: 6px; height: 88px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; gap: 4px; height: 100%; }
  .bar-col .bar-v { font-size: 11px; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .bar-col .bar { width: 100%; max-width: 34px; background: var(--bar); border-radius: 4px 4px 0 0; min-height: 2px; opacity: 0.85; }
  .bar-col .bar.zero { background: var(--card-2); opacity: 1; }
  .bar-col .bar-d { font-size: 11px; color: var(--muted); }
  .baseline { border-top: 1px solid var(--line); margin-top: 0; }
  .word-list-mini { display: flex; flex-direction: column; gap: 6px; }
  .wl-row { display: flex; justify-content: space-between; gap: 10px; font-size: 14px; align-items: baseline; border-bottom: 1px dashed var(--line); padding-bottom: 5px; }
  .wl-row:last-child { border-bottom: none; }
  .wl-row .wl-vi { font-family: var(--serif); font-weight: 600; font-size: 15px; }
  .wl-row .wl-stage { color: var(--muted); font-size: 12px; white-space: nowrap; }

  /* ---------- modal ---------- */
  .modal-scrim {
    position: fixed; inset: 0; background: rgba(20, 24, 21, 0.45); z-index: 50;
    display: flex; align-items: flex-end; justify-content: center; padding: 16px;
  }
  @media (min-width: 520px) { .modal-scrim { align-items: center; } }
  .modal {
    background: var(--paper); border: 1px solid var(--line); border-radius: 20px;
    max-width: 560px; width: 100%; max-height: 86vh; overflow-y: auto; padding: 24px;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
  }
  .modal-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .modal-close { color: var(--muted); font-size: 22px; line-height: 1; padding: 2px 6px; }
  .modal-close:hover { color: var(--ink); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 4px; }
  .field input {
    width: 100%; background: var(--card); border: 1.5px solid var(--line);
    border-radius: 12px; padding: 10px 14px; font-size: 16px;
  }
  .field input:focus { border-color: var(--accent); outline: none; }

  /* ---------- toast ---------- */
  #toast {
    position: fixed; left: 50%; bottom: calc(78px + env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%) translateY(8px);
    background: var(--ink); color: var(--paper); font-size: 14px; font-weight: 600;
    padding: 10px 18px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease; z-index: 60; max-width: 90vw;
    text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (min-width: 640px) { #toast { bottom: 24px; } }

  .empty { text-align: center; color: var(--muted); padding: 28px 16px; font-size: 14.5px; }
  .divider { border: none; border-top: 1px solid var(--line); margin: 18px 0; }
  .footnote { font-size: 12.5px; color: var(--muted); margin-top: 26px; text-align: center; }
  .footnote button { color: var(--ink-2); text-decoration: underline; text-underline-offset: 2px; }

  /* ---------- today: buddy, lessons, curriculum map ---------- */
  .buddy-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 4px; }
  .buddy-ava {
    flex: none; width: 52px; height: 52px; border-radius: 999px;
    background: var(--card-2); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
  }
  .buddy-ava svg { display: block; }
  .buddy-bubble {
    position: relative; flex: 1; min-width: 0;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 4px 16px 16px 16px; padding: 10px 15px 11px;
    font-size: 14.5px; box-shadow: var(--shadow); overflow-wrap: break-word;
  }
  .buddy-bubble .buddy-name {
    display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.09em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 2px;
  }
  .scene-banner {
    border-left: 3px solid var(--accent); background: var(--accent-wash);
    border-radius: 0 12px 12px 0; padding: 11px 15px;
    font-size: 14px; color: var(--ink-2); font-style: italic;
  }
  .row-card {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px 18px; margin-top: 10px; box-shadow: var(--shadow);
  }
  .row-card .rc-main { flex: 1; min-width: 0; }
  .row-card .rc-main .sub { font-size: 13px; }
  .row-card .btn { flex: none; }
  .week-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin: 20px 0 8px;
  }
  .week-label:first-of-type { margin-top: 0; }
  .lesson-row {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    border: 1px solid var(--line); border-radius: 14px; padding: 11px 15px; background: var(--card);
  }
  .lesson-row:not([disabled]):hover { border-color: var(--accent); }
  .lesson-row[disabled] { opacity: 0.5; cursor: default; }
  .lesson-row .l-idx {
    flex: none; width: 30px; height: 30px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; background: var(--card-2); color: var(--ink-2);
    font-variant-numeric: tabular-nums;
  }
  .lesson-row.done .l-idx { background: var(--jade-wash); color: var(--jade); }
  .lesson-row.current .l-idx { background: var(--accent); color: var(--on-accent); }
  .lesson-row .l-main { flex: 1; min-width: 0; }
  .lesson-row .l-name { font-weight: 600; font-size: 14.5px; }
  .lesson-row .l-sub { font-size: 12.5px; color: var(--muted); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>

{"packs":[{"id":"greetings","name":"Greetings & politeness","desc":"Say hello, thank people, and sound friendly"},{"id":"basics","name":"Survival phrases","desc":"Get unstuck when you don't understand"},{"id":"food","name":"Food & drink","desc":"Order pho, bánh mì, and coffee like a local"},{"id":"numbers","name":"Numbers & money","desc":"Count, pay, and bargain"},{"id":"directions","name":"Getting around","desc":"Taxis, directions, and finding places"},{"id":"shopping","name":"Shopping","desc":"Markets, sizes, and just looking"},{"id":"time","name":"Time & days","desc":"Today, tomorrow, and telling time"},{"id":"people","name":"People & pronouns","desc":"The famous Vietnamese pronoun system"},{"id":"words","name":"Core words","desc":"High-frequency verbs and adjectives"},{"id":"smalltalk","name":"Small talk","desc":"Compliments and friendly questions"},{"id":"emergency","name":"Emergency & health","desc":"Help, hospitals, and pharmacies"}],"entries":[{"id":"xin-chao","vi":"xin chào","en":"hello","alt":"hi;hey;greetings","pack":"greetings","ex":["Xin chào! Tôi tên là Ben.","Hello! My name is Ben."],"note":"The safe, all-purpose greeting — works with anyone, any time of day. In everyday speech Vietnamese people more often say chào + a pronoun: chào anh, chào chị, chào em."},{"id":"chao-anh","vi":"chào anh","en":"hello (to a man a bit older than you)","alt":"hi sir","pack":"greetings","ex":["Chào anh, anh khỏe không?","Hello, how are you?"],"note":"anh literally means 'older brother'. Use it for a man around your age or slightly older — including waiters and taxi drivers."},{"id":"chao-chi","vi":"chào chị","en":"hello (to a woman a bit older than you)","pack":"greetings","ex":["Chào chị, chị khỏe không?","Hello, how are you?"],"note":"chị literally means 'older sister'. Use it for a woman around your age or slightly older."},{"id":"chao-em","vi":"chào em","en":"hello (to someone younger than you)","pack":"greetings","ex":["Chào em, em tên là gì?","Hi, what's your name i.","Yes, I understand."],"note":"Southerners use dạ for polite yes. Everywhere, it's also a respectful way to acknowledge someone older."},{"id":"khong","vi":"không","en":"no / not","pack":"greetings","ex":["Không, cảm ơn.","No, thank you."],"note":"Also the question word at the end of yes/no questions: Bạn khỏe không? — Are you well?"},{"id":"lam-on","vi":"làm ơn","en":"please (asking a favor)","pack":"greetings","lit":"do a favor","ex":["Làm ơn nói chậm lại.","Please speak more slowly."],"note":"Stronger than English 'please' — used when genuinely asking a favor. Everyday politeness comes from pronouns and particles like ạ and nhé instead."},{"id":"a-particle","vi":"ạ","en":"polite particle (end of sentence)","pack":"greetings","ex":["Cảm ơn ạ!","Thank you (respectfully)!"],"note":"Drop ạ at the end of anything you say to someone older and you instantly sound more polite. One letter, huge effect."},{"id":"ban-khoe-khong","vi":"Bạn khỏe không?","en":"How are you?","alt":"how are you doing","pack":"greetings","lit":"you healthy no?","ex":["Chào chị! Chị khỏe không?","Hello! How are you?"],"note":"Swap bạn for the right pronoun: Anh khỏe không? Chị khỏe không?"},{"id":"toi-khoe","vi":"Tôi khỏe, cảm ơn.","en":"I'm fine, thank you.","alt":"im good","pack":"greetings","ex":["Tôi khỏe, cảm ơn. Còn bạn?","I'm fine, thanks. And you?"],"note":"Còn bạn? = 'and you?' — an easy way to keep the exchange going."},{"id":"rat-vui-duoc-gap-ban","vi":"Rất vui được gặp bạn","en":"Nice to meet you","alt":"pleased to meet you","pack":"greetings","lit":"very happy get meet you","ex":["Rất vui được gặp anh!","Very nice to meet you!"]},{"id":"ban-ten-la-gi","vi":"Bạn tên là gì?","en":"What's your name?","pack":"greetings","lit":"you name is what?","ex":["Chào em, em tên là gì?","Hi, what's your name?"]},{"id":"toi-ten-la","vi":"Tôi tên là…","en":"My name is…","pack":"greetings","ex":["Tôi tên là Wilson.","My name is Wilson."]},{"id":"chuc-ngu-ngon","vi":"Chúc ngủ ngon","en":"Good night", này là gì? — Đó là bánh cuốn.","What's this? — That's bánh cuốn (rice rolls)."]},{"id":"tieng-viet","vi":"tiếng Việt","en":"Vietnamese (language)","pack":"basics","lit":"language Viet","ex":["Tôi đang học tiếng Việt.","I'm learning Vietnamese."]},{"id":"tieng-anh","vi":"tiếng Anh","en":"English (language)","pack":"basics","lit":"language England","ex":["Chị nói tiếng Anh giỏi quá!","You speak English so well!"]},{"id":"toi-la-nguoi-my","vi":"Tôi là người Mỹ","en":"I'm American","pack":"basics","lit":"I am person America","ex":["Tôi là người Mỹ, đến từ California.","I'm American, from California."],"note":"Swap the country: người Anh (British), người Úc (Australian), người Canada."},{"id":"ban-den-tu-dau","vi":"Bạn đến từ đâu?","en":"Where are you from?","pack":"basics","lit":"you come from where?","ex":["Anh đến từ đâu? — Tôi đến từ Mỹ.","Where are you from? — I'm from the US."]},{"id":"toi-den-tu-my","vi":"Tôi đến từ Mỹ","en":"I'm from the US","pack":"basics","lit":"I come from America","ex":["Tôi đến từ Mỹ.","I come from America."]},{"id":"toi-khong-biet","vi":"Tôi không biết","en":"I don't know","pack":"basics","ex":["Xin lỗi, tôi không biết.","Sorry, I don't know."]},{"id":"duoc","vi":"được","en":"okay / can / it works","alt":"alright;possible","pack":"basics","ex":["Được không? — Được!","Is that okay? — Okay!"],"note":"One of the most versatile words in Vietnamese: 'can', 'may', 'okay', 'fine'. Tack được không? onto anything to ask 'is that possible?'"},{"id":"cho-mot-chut","vi":"Chờ một chút","en":"Wait a moment","alt":"hold on;just a second","pack":"basics","lit":"wait one little","ex":["Chờ một chút nhé!","Hold on a second!"],"note":"You'll also hear đợi một chút — same meaning."},{"id":"khong-biet-noi","vi":"Tiếng Việt nói thế nào?","en":"How do you say it in Vietnamese?","pack":"basics","lit":"language Viet speak how?","ex":["'Delicious' tiếng Việt nói thế nào? — Ngon!","How do you say 'delicious' in Vietnamese? — Ngon!"]},{"id":"pho","vi":"phở","en":"pho (noodle soup)","alt":"noodle soup","pack":"food","ex":["Cho tôi một bát phở bò.","One bowl of beef pho, please."],"note":"Note the tone: phở has the dipping hỏi tone. Say it flat and you might be saying phố (street) or phô (to show off)."},{"id":"pho-bo","vi":"phở bò","en":"beef pho","pack":"food","ex":["Phở bò tái, ít hành.","Rare-beef pho, easy on the onions."],"note":"tái = rare beef, chín = well-done brisket."},{"id":"pho-ga","vi":"phở gà","en":"chicken pho","pack":"food","ex":["Một phở gà mang về.","One chicken pho to go."]},{"id":"banh-mi","vi":"bánh mì","en":"banh mi (baguette sandwich) / bread","alt":"sandwich;bread","pack":"food","ex":["Một bánh mì thịt, không rau mùi.","One meat banh mi, no cilantro."],"note":"Also just means 'bread'. A legacy of the French baguette, made gloriously Vietnamese."},{"id":"com","vi":"cơm","en":"cooked rice / a rice meal","alt":"rice","pack":"food","ex":["Cho tôi một suất cơm gà.","One chicken-rice, please."],"note":"cơm means both rice and a meal. Ăn cơm chưa? ('eaten rice yet?') is a common friendly greeting."},{"id":"bun-cha","vi":"bún chả","en":"bun cha (grilled pork with noodles)","pack":"food","ex":["Bún chả ở Hà Nội ngon nhất.","Bun cha is best in Hanoi."],"note":"Hanoi's signature lunch — the dish Obama and Anthony Bourdain ate together."},{"id":"goi-cuon","vi":"gỏi cuốn","en":"fresh spring rolls","alt":"summer rolls","pack":"food","lit":"salad roll","ex":["Gỏi cuốn tôm, hai cái.","Shrimp fresh rolls, two please."]},{"id":"nem-ran","vi":"nem rán","en":"fried spring rolls","pack":"food","ex":["Nem rán ăn với nước mắm.","Fried rolls are eaten with fish sauce."],"note":"Northern name. In the South they're chả giò."},{"id":"ca-phe","vi":"cà phê","en":"coffee","pack":"food","ex":["Đi uống cà phê không?","Want to go for coffee?"],"note":"From French café. Vietnamese coffee culture is world-class — an invitation to cà phê is an invitation to sit and talk for hours."},{"id":"ca-phe-sua-da","vi":"cà phê sữa đá","en":"iced milk coffee","alt":"vietnamese iced coffee","pack":"food","lit":"coffee milk ice","ex":["Cho tôi một cà phê sữa đá.","One iced milk coffee, please."],"note":"The national drink: strong coffee over condensed milk and ice. Order it word-by-word: coffee–milk–ice."},{"id":"ca-phe-den","vi":"cà phê đen","en":"black coffee","pack":"food","lit":"coffee black","ex":["Cà phê đen nóng, ít đường.","Hot black coffee, little sugar."]},{"id":"tra-da","vi":"trà đá","en":"iced tea","pack":"food","lit":"tea ice","ex":["Cho xin một trà đá.","An iced tea, please."],"note":"Often free and bottomless at street food places. The unofficial drink of Vietnamese sidewalks."},{"id":"nuoc","vi":"nước","en":"water","pack":"food","ex":["Cho tôi một chai nước.","A bottle of water, please."],"note":"Also means 'country' — nước Việt Nam. Water and homeland share a word."},{"id":"nuoc-suoi","vi":"nước suối","en":"bottled water","alt":"mineral water","pack":"food","lit":"spring water","ex":["Hai chai nước suối lạnh.","Two cold bottles of water."]},{"id":"bia","vi":"bia","en":"beer","pack":"food","ex":["Cho tôi hai chai bia.","Two bottles of beer, please."],"note":"Bia hơi = fresh draft beer, a Hanoi institution at ~30 cents a glass. Cheers is Một, hai, ba, dô!"},{"id":"nuoc-mia","vi":"nước mía","en":"sugarcane juice","pack":"food","ex":["Nước mía mát lắm!","Sugarcane juice is so refreshing!"]},{"id":"sinh-to","vi":"sinh tố","en":"fruit smoothie","pack":"food","ex":["Sinh tố xoài, ít đường.","Mango smoothie, less sugar."]},{"id":"cho-toi","vi":"Cho tôi…","en":"I'll have… / please give me…","alt":"can i have;give me","pack":"food","lit":"give me","ex":["Cho tôi một bánh mì và một cà phê.","I'll have a banh mi and a coffee."],"note":"THE ordering pattern. Cho tôi + thing = 'give me (that thing), please'. Polite as-is — no extra 'please' needed."},{"id":"toi-muon","vi":"Tôi muốn…","en":"I want…","alt":"i would like","pack":"food","ex":["Tôi muốn thử món này.","I want to try this dish."]},{"id":"mot-suat","vi":"một suất","en":"one portion / one serving","pack":"food","ex":["Cho tôi một suất bún chả.","One serving of bun cha, please."],"note":"Northern. In the South you'll hear một phần."},{"id":"mang-ve","vi":"mang về","en":"takeaway / to go","alt":"take out","pack":"food","lit":"carry back","ex":["Một cà phê sữa đá mang về.","One iced milk coffee to go."]},{"id":"an-o-day","vi":"ăn ở đây","en":"eat here (dine in)","pack":"food","lit":"eat at here","ex":["Ăn ở đây hay mang về?","Eating here or takeaway?"],"note":"This is the question staff will ask YOU — now you'll recognize it."},{"id":"thuc-don","vi":"thực đơn","en":"menu","pack":"food","ex":["Cho tôi xem thực đơn.","Could I see the menu?"],"note":"Many street spots have no menu — the dish name on the sign IS the menu. You'll also hear the English word 'menu'."},{"id":"ngon-qua","vi":"Ngon quá!","en":"So delicious!","alt":"tasty;yummy","pack":"food","lit":"delicious too-much","ex":["Ngon quá! Cho tôi thêm một bát.","So good! One more bowl, please."],"note":"The single best thing to say to any cook in Vietnam."},{"id":"cay","vi":"cay","en":"spicy","alt":"hot spicy","pack":"food","ex":["Món này cay không?","Is this dish spicy?"]},{"id":"khong-cay","vi":"không cay","en":"not spicy","alt":"no chili;mild","pack":"food","ex":["Không cay nhé!","Not spicy, please!"],"note":"Add nhé to make it a friendly request. Also useful: ít cay — just a little spicy."},{"id":"chay","vi":"chay","en":"vegetarian","alt":"vegan","pack":"food","ex":["Tôi ăn chay.","I'm vegetarian."],"note":"Quán chay = vegetarian restaurant. Buddhist-style vegetarian food is everywhere, especially on the 1st and 15th of the lunar month."},{"id":"di-ung","vi":"Tôi bị dị ứng với…","en":"I'm allergic to…","alt":"allergy","pack":"food","ex":["Tôi bị dị ứng với đậu phộng.","I'm allergic to peanuts."],"note":"đậu phộng = peanuts (lạc in the North), tôm = shrimp, hải sản = seafood."},{"id":"dua","vi":"đũa","en":"chopsticks","pack":"food","ex":["Cho tôi xin đôi đũa.","May I have a pair of chopsticks?"]},{"id":"tinh-tien","vi":"Tính tiền!","en":"The check, please!","alt":"bill please;check","pack":"food","lit":"calculate money","ex":["Em ơi, tính tiền!","Excuse me, the check please!"],"note":"Call it out — no one brings the bill until you ask. Pair with ơi to get attention politely."},{"id":"em-oi","vi":"em ơi","en":"excuse me! (calling younger staff)","alt":"waiter;hey","pack":"food","ex":["Em ơi, cho anh một trà đá!","Excuse me, one iced tea!"],"note":"ơi is the calling particle — totally polite. Use anh ơi / chị ơi for staff older than you. Shouting across the room is normal and expected."},{"id":"no-roi","vi":"Tôi no rồi","en":"I'm full","pack":"food","lit":"I full already","ex":["Tôi no rồi, cảm ơn chị!","I'm full, thank you!"]},{"id":"doi","vi":"đói","en":"hungry","pack":"food","ex":["Tôi đói quá! Đi ăn thôi.","I'm starving! Let's go eat."]},{"id":"khat-nuoc","vi":"khát nước","en":"thirsty","pack":"food","lit":"thirsty water","ex":["Tôi khát nước quá.","I'm so thirsty."]},{"id":"it-ngot","vi":"ít ngọt","en":"less sweet","pack":"food","lit":"little sweet","ex":["Sinh tố xoài, ít ngọt nhé.","Mango smoothie, less sweet please."],"note":"Drinks are often very sweet by default — this phrase is a lifesaver. ít đường = less sugar works too."},{"id":"it-da","vi":"ít đá","en":"little ice","pack":"food","ex":["Cà phê sữa, ít đá.","Milk coffee, easy on the ice."]},{"id":"them","vi":"thêm","en":"more / to add","alt":"extra;another","pack":"food","ex":["Cho tôi thêm rau.","More herbs, please."],"note":"thêm một... nữa = 'one more...': Thêm một bia nữa!"},{"id":"rau","vi":"rau","en":"vegetables / fresh herbs","pack":"food","ex":["Ăn phở phải có rau thơm.","Pho needs fresh herbs."]},{"id":"thit","vi":"thịt","en":"meat","pack":"food","ex":["Bánh mì thịt nướng.","Grilled-meat banh mi."],"note":"thịt bò beef · thịt gà chicken · thịt lợn pork (heo in the South)."},{"id":"ca","vi":"cá","en":"fish","pack":"food","ex":["Tôi không ăn cá.","I don't eat fish."],"note":"Rising tone! Flat cà is eggplant/tomato (cà chua), as in cà phê it's just a sound."},{"id":"trung","vi":"trứng","en":"egg","pack":"food","ex":["Bánh mì trứng, hai quả trứng.","Egg banh mi, two eggs."]},{"id":"bat","vi":"bát","en":"bowl","pack":"food","ex":["Một bát phở, một bát cơm.","One bowl of pho, one bowl of rice."],"note":"Northern. Southerners say tô: một tô phở."},{"id":"coc","vi":"cốc","en":"glass / cup","pack":"food","ex":["Hai cốc bia hơi!","Two glasses of draft beer!"],"note":"Northern. Southerners say ly: một ly cà phê."},{"id":"mot","vi":"một","en":"one (1)","pack":"numbers","ex":["Cho tôi một cà phê.","One coffee, please."]},{"id":"hai","vi":"hai","en":"two (2)","pack":"numbers","ex":["Hai người, một bàn.","Two people, one table."]},{"id":"ba","vi":"ba","en":"three (3)","pack":"numbers","ex":["Một, hai, ba, dô!","One, two, three, cheers!"],"note":"Also means 'dad' in the South. Context makes it clear."},{"id":"bon","vi":"bốn","en":"four (4)","pack":"numbers","ex":["Bốn người ăn.","Four people eating."]},{"id":"nam-5","vi":"năm","en":"five (5)","pack":"numbers","ex":["Năm nghìn đồng.","Five thousand dong."],"note":"Exactly the same word as năm 'year'. Sáu năm = six years; năm sáu = fifty-six-ish confusion — context sorts it out."},{"id":"sau","vi":"sáu","en":"six (6)","pack":"numbers","ex":["Sáu giờ tối.","Six in the evening."]},{"id":"bay","vi":"bảy","en":"seven (7)","pack":"numbers","ex":["Bảy ngày một tuần.","Seven days a week."]},{"id":"tam","vi":"tám","en":"eight (8)","pack":"numbers","ex":["Tám giờ sáng.","Eight in the morning."]},{"id":"chin","vi":"chín","en":"nine (9)","pack":"numbers","ex":["Chín mươi nghìn.","Ninety thousand."],"note":"Also means 'ripe/cooked' — phở chín is well-done-beef pho."},{"id":"muoi-10","vi":"mười","en":"ten (10)","pack":"numbers","ex":["Mười nghìn đồng.","Ten thousand dong."]},{"id":"muoi-mot","vi":"mười một","en":"eleven (11)","pack":"numbers","ex":["Mười một giờ.","Eleven o'clock."],"note":"Teens are mười + digit. Watch 15: it's mười lăm (năm changes to lăm)."},{"id":"hai-muoi","vi":"hai mươi","en":"twenty (20)","pack":"numbers","ex":["Hai mươi nghìn.","Twenty thousand."],"note":"From 20 up, mười softens to mươi. 21 = hai mươi mốt (một→mốt), 25 = hai mươi lăm."},{"id":"mot-tram","vi":"một trăm","en":"one hundred (100)","pack":"numbers","ex":["Một trăm phần trăm!","One hundred percent!"],"note":"Một trăm phần trăm — 'bottoms up!' at any drinking table."},{"id":"mot-nghin","vi":"một nghìn","en":"one thousand (1,000)","pack":"numbers","ex":["Bánh mì hai mươi nghìn.","The banh mi is twenty thousand."],"note":"Southern: một ngàn. Prices drop the đồng: 'hai mươi nghìn' = 20,000₫ ≈ $0.80."},{"id":"muoi-nghin","vi":"mười nghìn","en":"ten thousand (10,000)","pack":"numbers","ex":["Trà đá mười nghìn thôi.","The iced tea is only ten thousand."],"note":"Your everyday price unit. Locals shorten it: 'mười' or even '10k'."},{"id":"mot-tram-nghin","vi":"một trăm nghìn","en":"one hundred thousand (100,000)","pack":"numbers","ex":["Tất cả một trăm nghìn.","Altogether one hundred thousand."],"note":"≈ $4. The green 100k note is the workhorse of your wallet."},{"id":"mot-trieu","vi":"một triệu","en":"one million (1,000,000)","pack":"numbers","ex":["Khách sạn một triệu một đêm.","The hotel is a million a night."],"note":"≈ $40. Being a 'millionaire' is easy in Vietnam."},{"id":"bao-nhieu-tien","vi":"Bao nhiêu tiền?","en":"How much (money)?","alt":"how much does it cost;price","pack":"numbers","lit":"how-much money?","ex":["Cái này bao nhiêu tiền?","How much is this one?"],"note":"Often shortened to just Bao nhiêu? Point at the thing and ask."},{"id":"tien","vi":"tiền","en":"money","pack":"numbers","ex":["Tôi không có tiền lẻ.","I don't have small change."]},{"id":"dat-qua","vi":"Đắt quá!","en":"Too expensive!","pack":"numbers","ex":["Đắt quá! Giảm giá đi.","Too expensive! Lower it a bit."],"note":"Step one of bargaining, always with a smile. Southern version: Mắc quá!"},{"id":"re","vi":"rẻ","en":"cheap","pack":"numbers","ex":["Rẻ hơn được không?","Can you make it cheaper?"],"note":"hơn after an adjective = 'more/-er': rẻ hơn cheaper, đẹp hơn prettier."},{"id":"giam-gia","vi":"Giảm giá được không?","en":"Can you lower the price?","alt":"discount","pack":"numbers","lit":"reduce price possible no?","ex":["Mua hai cái, giảm giá được không?","If I buy two, can you drop the price?"]},{"id":"tien-thua","vi":"tiền thừa","en":"change (money back)","pack":"numbers","lit":"money leftover","ex":["Anh ơi, tiền thừa của tôi.","Excuse me, my change."],"note":"Southern: tiền thối. Small notes look alike — the 20k and 500k are both blue-ish. Check twice!"},{"id":"the","vi":"Trả bằng thẻ được không?","en":"Can I pay by card?","alt":"credit card","pack":"numbers","lit":"pay by card possible no?","ex":["Ở đây trả bằng thẻ được không?","Can I pay by card here?"],"note":"Cafés and street food are cash or QR-transfer country. Everyone pays by bank-app QR code now."},{"id":"tien-mat","vi":"tiền mặt","en":"cash","pack":"numbers","lit":"money face","ex":["Chỉ nhận tiền mặt thôi.","Cash only."]},{"id":"o-dau","vi":"…ở đâu?","en":"Where is…?","alt":"where","pack":"directions","lit":"at where?","ex":["Nhà vệ sinh ở đâu?","Where's the restroom?"],"note":"Name the thing first, then ở đâu: Chợ ở đâu? Khách sạn ở đâu?"},{"id":"nha-ve-sinh","vi":"nhà vệ sinh","en":"restroom / toilet","alt":"bathroom;wc","pack":"directions","lit":"house hygiene","ex":["Xin lỗi, nhà vệ sinh ở đâu?","Excuse me, where's the restroom?"],"note":"'Toilet' and 'WC' are also universally understood."},{"id":"ben-trai","vi":"bên trái","en":"on the left","alt":"left","pack":"directions","lit":"side left","ex":["Quán cà phê bên trái.","The café is on the left."]},{"id":"ben-phai","vi":"bên phải","en":"on the right","alt":"right","pack":"directions","lit":"side right","ex":["Khách sạn bên phải.","The hotel is on the right."]},{"id":"re-trai","vi":"rẽ trái","en":"turn left","pack":"directions","ex":["Đến ngã tư, rẽ trái.","At the intersection, turn left."],"note":"Northern. Southern: quẹo trái."},{"id":"re-phai","vi":"rẽ phải","en":"turn right","pack":"directions","ex":["Rẽ phải ở đèn đỏ.","Turn right at the light."]},{"id":"di-thang","vi":"đi thẳng","en":"go straight","pack":"directions","ex":["Đi thẳng khoảng hai trăm mét.","Go straight about 200 meters."]},{"id":"dung-lai","vi":"Dừng lại!","en":"Stop!","alt":"stop here","pack":"directions","ex":["Dừng lại ở đây ạ.","Stop here, please."],"note":"Essential in taxis. Gentler: Cho tôi xuống đây — let me off here."},{"id":"o-day","vi":"ở đây","en":"here","pack":"directions","ex":["Dừng ở đây được rồi.","Stopping here is fine."]},{"id":"dang-kia","vi":"đằng kia","en":"over there","pack":"directions","ex":["Chợ ở đằng kia.","The market is over there."]},{"id":"gan","vi":"gần","en":"near","alt":"close","pack":"directions","ex":["Gần đây có quán phở không?","Is there a pho place near here?"],"note":"gần đây = near here. A golden pattern: Gần đây có ... không?"},{"id":"xa","vi":"xa","en":"far","pack":"directions","ex":["Có xa không? — Không xa lắm.","Is it far? — Not very far."]},{"id":"khach-san","vi":"khách sạn","en":"hotel","pack":"directions","lit":"guest house","ex":["Cho tôi về khách sạn.","Take me back to the hotel, please."]},{"id":"san-bay","vi":"sân bay","en":"airport","pack":"directions","lit":"yard fly","ex":["Cho tôi ra sân bay.","To the airport, please."]},{"id":"ben-xe","vi":"bến xe","en":"bus station","pack":"directions","ex":["Bến xe Mỹ Đình ở đâu?","Where is My Dinh bus station?"]},{"id":"ga-tau","vi":"ga tàu","en":"train station","pack":"directions","ex":["Ga Hà Nội cách đây bao xa?","How far is Hanoi station from here?"],"note":"ga comes from French gare. The north–south Reunification Express is a classic trip."},{"id":"xe-may","vi":"xe máy","en":"motorbike","alt":"scooter","pack":"directions","lit":"vehicle machine","ex":["Thuê xe máy một ngày bao nhiêu?","How much to rent a motorbike for a day?"],"note":"The bloodstream of Vietnam — 70+ million of them."},{"id":"xe-buyt","vi":"xe buýt","en":"bus","pack":"directions","ex":["Xe buýt số mấy đến Hồ Gươm?","Which bus goes to Hoan Kiem Lake?"]},{"id":"taxi","vi":"taxi","en":"taxi","pack":"directions","pron":"tắc-xi → tak see","ex":["Gọi taxi giúp tôi được không?","Could you call me a taxi?"],"note":"Written like English, said tắc-xi. Grab (the app) is how most people ride now."},{"id":"duong","vi":"đường","en":"street / road","pack":"directions","ex":["Đường này tên là gì?","What's this street called?"],"note":"Also means 'sugar' — same spelling, same tone! Ít đường in a café = less sugar, not fewer roads."},{"id":"ban-do","vi":"bản đồ","en":"map","pack":"directions","ex":["Chỉ cho tôi trên bản đồ được không?","Can you show me on the map?"]},{"id":"cham-thoi","vi":"Chậm thôi ạ!","en":"Slowly, please! (to a driver)","alt":"slow down driving","pack":"directions","lit":"slow only please","ex":["Anh ơi, chậm thôi ạ!","Please slow down!"],"note":"For motorbike-taxi rides you'll be glad you know this one."},{"id":"bao-lau","vi":"Đi mất bao lâu?","en":"How long does it take?","pack":"directions","lit":"go lose how long?","ex":["Đi sân bay mất bao lâu?","How long to the airport?"]},{"id":"mua","vi":"mua","en":"to buy","pack":"shopping","ex":["Tôi muốn mua cái này.","I'd like to buy this."]},{"id":"ban-sell","vi":"bán","en":"to sell","pack":"shopping","ex":["Cô ơi, cái này bán thế nào?","Ma'am, how are you selling this? (how much?)"],"note":"Rising tone bán = sell. Flat bàn = table. Bạn (friend) has the heavy tone. Three words, one spelling family!"},{"id":"cai-nay","vi":"cái này","en":"this one","pack":"shopping","ex":["Cái này bao nhiêu tiền?","How much is this one?"],"note":"cái is the general classifier for things — point and say cái này and you can shop anywhere."},{"id":"cai-kia","vi":"cái kia","en":"that one","pack":"shopping","ex":["Không phải cái này, cái kia.","Not this one — that one."]},{"id":"lon","vi":"lớn","en":"big","alt":"large","pack":"shopping","ex":["Có cỡ lớn hơn không?","Do you have a bigger size?"],"note":"In the North you'll also hear to: áo này to quá — this shirt's too big."},{"id":"nho","vi":"nhỏ","en":"small","pack":"shopping","ex":["Cho tôi cỡ nhỏ.","Small size, please."]},{"id":"mau-do","vi":"màu đỏ","en":"red (color)","pack":"shopping","ex":["Tôi thích cái màu đỏ.","I like the red one."]},{"id":"mau-xanh","vi":"màu xanh","en":"blue / green (color)","pack":"shopping","ex":["Màu xanh da trời hay xanh lá cây?","Sky blue or leaf green?"],"note":"xanh covers BOTH blue and green. Specify: xanh da trời 'sky xanh' = blue, xanh lá cây 'leaf xanh' = green."},{"id":"chi-xem-thoi","vi":"Tôi chỉ xem thôi","en":"I'm just looking","alt":"just browsing","pack":"shopping","lit":"I only look only","ex":["Tôi chỉ xem thôi, cảm ơn chị.","Just looking, thank you."],"note":"Deploy early and often in markets — it works like a charm."},{"id":"cho","vi":"chợ","en":"market","pack":"shopping","ex":["Chợ đêm mở lúc mấy giờ?","What time does the night market open?"],"note":"Nặng tone — low and heavy. Chờ (falling) means 'to wait'. Wait at the market: chờ ở chợ."},{"id":"sieu-thi","vi":"siêu thị","en":"supermarket","pack":"shopping","lit":"super market","ex":["Siêu thị gần nhất ở đâu?","Where's the nearest supermarket?"]},{"id":"hom-nay","vi":"hôm nay","en":"today","pack":"time","ex":["Hôm nay trời đẹp quá!","Beautiful weather today!"]},{"id":"ngay-mai","vi":"ngày mai","en":"tomorrow","pack":"time","ex":["Hẹn gặp lại ngày mai!","See you tomorrow!"]},{"id":"hom-qua","vi":"hôm qua","en":"yesterday","pack":"time","ex":["Hôm qua tôi ăn phở.","Yesterday I ate pho."]},{"id":"bay-gio","vi":"bây giờ","en":"now","pack":"time","ex":["Bây giờ tôi phải đi.","I have to go now."]},{"id":"may-gio-roi","vi":"Mấy giờ rồi?","en":"What time is it?","pack":"time","lit":"how-many hour already?","ex":["Xin lỗi, mấy giờ rồi ạ?","Excuse me, what time is it?"]},{"id":"gio","vi":"giờ","en":"hour / o'clock","pack":"time","ex":["Ba giờ chiều.","Three in the afternoon."],"note":"Time = number + giờ + part of day: bảy giờ sáng 7am, tám giờ tối 8pm."},{"id":"phut","vi":"phút","en":"minute","pack":"time","ex":["Chờ năm phút nhé.","Wait five minutes, okay?"]},{"id":"buoi-sang","vi":"buổi sáng","en":"morning","pack":"time","ex":["Buổi sáng tôi uống cà phê.","In the morning I drink coffee."]},{"id":"buoi-chieu","vi":"buổi chiều","en":"afternoon","pack":"time","ex":["Buổi chiều đi chợ.","Going to the market in the afternoon."]},{"id":"buoi-toi","vi":"buổi tối","en":"evening","pack":"time","ex":["Buổi tối ăn gì?","What's for dinner tonight?"]},{"id":"thu-hai","vi":"thứ hai","en":"Monday","pack":"time","lit":"the second","ex":["Thứ hai tôi bay về Mỹ.","Monday I fly back to the States."],"note":"Days are numbered from Sunday: Monday is 'day two' (thứ hai), Tuesday thứ ba… Saturday thứ bảy. Wednesday is thứ tư (not *thứ bốn)."},{"id":"chu-nhat","vi":"chủ nhật","en":"Sunday","pack":"time","lit":"lord's day","ex":["Chủ nhật quán đóng cửa.","The shop is closed on Sunday."],"note":"The one day with a name, from Catholic missionaries — 'the Lord's day'."},{"id":"cuoi-tuan","vi":"cuối tuần","en":"weekend","pack":"time","lit":"end week","ex":["Cuối tuần này bạn làm gì?","What are you doing this weekend?"]},{"id":"tuan","vi":"tuần","en":"week","pack":"time","ex":["Tôi ở đây hai tuần.","I'm here for two weeks."]},{"id":"thang","vi":"tháng","en":"month","pack":"time","ex":["Tháng này là tháng bảy.","This month is July."],"note":"Months are numbered too: tháng một January … tháng mười hai December."},{"id":"nam-year","vi":"năm","en":"year","pack":"time","ex":["Chúc mừng năm mới!","Happy New Year!"],"note":"Same word as 'five'! Năm mới = new year; Tết is THE new year (lunar)."},{"id":"ngay","vi":"ngày","en":"day","pack":"time","ex":["Một ngày đẹp trời.","A beautiful day."]},{"id":"toi","vi":"tôi","en":"I / me (neutral)","pack":"people","ex":["Tôi là người Mỹ.","I am American."],"note":"The safe, neutral 'I' for a learner. Vietnamese has no fixed 'I' and 'you' — people call themselves and each other by family terms based on relative age. Tôi keeps you neutral while you learn."},{"id":"ban","vi":"bạn","en":"you (peer) / friend","pack":"people","ex":["Bạn tên là gì?","What's your name?"],"note":"Literally 'friend'. Fine for people your own age; for anyone older, switch to anh/chị."},{"id":"anh","vi":"anh","en":"older brother → you/he (slightly older man)","pack":"people","ex":["Anh ơi, cho em hỏi!","Excuse me (to an older man), a question!"],"note":"The heart of Vietnamese address: everyone is family. A man slightly older than you is 'older brother' — as 'you' and as 'he'."},{"id":"chi","vi":"chị","en":"older sister → you/she (slightly older woman)","pack":"people","ex":["Chị ơi, tính tiền!","Excuse me (to an older woman), the bill!"],"note":"Use for women around your age or a bit older. When unsure between chị and em for a woman, chị is the safer, more respectful guess."},{"id":"em","vi":"em","en":"younger sibling → you (younger person)","pack":"people","ex":["Em ăn cơm chưa?","Have you (younger) eaten yet?"],"note":"Anyone clearly younger, either gender. Also what YOU call yourself when talking to someone older: Em cảm ơn anh!"},{"id":"ong","vi":"ông","en":"grandfather → sir (elderly man)","alt":"mr","pack":"people","ex":["Chào ông ạ!","Hello, sir!"],"note":"For men your grandparents' age. Also 'Mr.' in formal settings: ông Nam."},{"id":"ba-grandma","vi":"bà","en":"grandmother → madam (elderly woman)","alt":"mrs","pack":"people","ex":["Cảm ơn bà ạ!","Thank you, madam!"],"note":"Falling tone bà = grandmother. Flat ba = three (or 'dad' in the South). The tone IS the meaning."},{"id":"chu","vi":"chú","en":"uncle → you (man your parents' age)","pack":"people","ex":["Chú ơi, sân bay đi lối nào?","Uncle, which way to the airport?"],"note":"For men noticeably older than you but not elderly — taxi drivers of a certain age approve of a respectful chú."},{"id":"co-aunt","vi":"cô","en":"aunt → you (woman your parents' age); teacher","pack":"people","ex":["Cô ơi, cho cháu một bánh mì!","Auntie, one banh mi please!"],"note":"Also what students call a female teacher. When addressing a chú or cô, call yourself cháu (niece/nephew)."},{"id":"chung-ta","vi":"chúng ta","en":"we (including you)","pack":"people","ex":["Chúng ta đi ăn thôi!","Let's go eat!"],"note":"Vietnamese has two 'we': chúng ta includes the listener, chúng tôi excludes them ('we, but not you')."},{"id":"ho","vi":"họ","en":"they / them","pack":"people","ex":["Họ là bạn của tôi.","They are my friends."],"note":"Also means 'family name' — họ của bạn là gì? What's your surname?"},{"id":"nguoi","vi":"người","en":"person / people","pack":"people","ex":["Người Việt Nam rất thân thiện.","Vietnamese people are very friendly."],"note":"người + country = nationality: người Việt, người Mỹ, người Nhật."},{"id":"viet-nam","vi":"Việt Nam","en":"Vietnam","pack":"people","ex":["Tôi yêu Việt Nam!","I love Vietnam!"],"note":"Nặng tone then flat: vee-ET (clipped) nahm. Say it low and crisp on the first syllable."},{"id":"nuoc-my","vi":"nước Mỹ","en":"the USA / America","pack":"people","lit":"country America","ex":["Nước Mỹ xa Việt Nam lắm.","America is very far from Vietnam."],"note":"Mỹ alone usually suffices: người Mỹ, đồ Mỹ (American stuff)."},{"id":"an","vi":"ăn","en":"to eat","pack":"words","ex":["Bạn ăn cơm chưa?","Have you eaten yet?"],"note":"Ăn cơm chưa? is a greeting, like 'how's it going?' — the expected answer is Rồi! (already) even if you're starving."},{"id":"uong","vi":"uống","en":"to drink","pack":"words","ex":["Uống gì không?","Want something to drink?"]},{"id":"di","vi":"đi","en":"to go","pack":"words","ex":["Đi thôi!","Let's go!"],"note":"Đi thôi! and Đi đi! ('go ahead, go!') are everyday exclamations. Also softens commands: Ăn đi! — dig in!"},{"id":"den","vi":"đến","en":"to come / arrive","pack":"words","ex":["Khi nào bạn đến?","When do you arrive?"]},{"id":"ve","vi":"về","en":"to return / go home","pack":"words","ex":["Tôi về đây!","I'm heading home!"],"note":"về nhà = go home; mang về = take away (carry home). A word full of homesickness."},{"id":"thich","vi":"thích","en":"to like","pack":"words","ex":["Tôi thích phở lắm.","I really like pho."]},{"id":"yeu","vi":"yêu","en":"to love","pack":"words","ex":["Anh yêu em.","I love you (man to woman)."],"note":"Pronouns carry the romance: Anh yêu em (he→her), Em yêu anh (she→him). Choose wisely!"},{"id":"muon","vi":"muốn","en":"to want","pack":"words","ex":["Bạn muốn gì?","What do you want?"]},{"id":"can","vi":"cần","en":"to need","pack":"words","ex":["Tôi cần một taxi.","I need a taxi."]},{"id":"biet","vi":"biết","en":"to know","pack":"words","ex":["Tôi biết rồi!","I know!"]},{"id":"noi","vi":"nói","en":"to speak / say","pack":"words","ex":["Nói tiếng Việt khó không?","Is speaking Vietnamese hard?"]},{"id":"nghe","vi":"nghe","en":"to listen / hear","pack":"words","ex":["Nghe hay quá!","That sounds great!"],"note":"Nghe nói… = 'I heard that…' — the classic gossip opener."},{"id":"xem","vi":"xem","en":"to look at / watch","pack":"words","ex":["Cho tôi xem một chút.","Let me have a look."]},{"id":"lam","vi":"làm","en":"to do / make / work","pack":"words","ex":["Bạn làm nghề gì?","What do you do (for work)?"]},{"id":"o-live","vi":"ở","en":"to live at / be at","pack":"words","ex":["Tôi ở Hà Nội.","I live in Hanoi."],"note":"One tiny word for at/in/live: Tôi ở đây — I'm here."},{"id":"co-have","vi":"có","en":"to have / there is","pack":"words","ex":["Anh có trà đá không?","Do you have iced tea?"],"note":"The pattern có … không? ('is there…?') unlocks hundreds of questions: Có wifi không? Có phòng không?"},{"id":"tot","vi":"tốt","en":"good","pack":"words","ex":["Rất tốt!","Very good!"]},{"id":"xau","vi":"xấu","en":"bad / ugly","pack":"words","ex":["Thời tiết hôm nay xấu quá.","The weather today is awful."]},{"id":"nong","vi":"nóng","en":"hot","pack":"words","ex":["Hôm nay nóng quá!","It's so hot today!"],"note":"Weather AND temperature of food/drinks: cà phê nóng = hot coffee."},{"id":"lanh","vi":"lạnh","en":"cold","pack":"words","ex":["Nước lạnh, không đá.","Cold water, no ice."]},{"id":"met","vi":"mệt","en":"tired","pack":"words","ex":["Hôm nay tôi mệt quá.","I'm so tired today."]},{"id":"vui","vi":"vui","en":"happy / fun","pack":"words","ex":["Vui quá!","So fun!"],"note":"Rất vui được gặp bạn — very happy to meet you."},{"id":"buon","vi":"buồn","en":"sad","pack":"words","ex":["Đừng buồn nhé.","Don't be sad, okay?"],"note":"Also 'to feel like': buồn ngủ sleepy, buồn cười funny (feel like laughing)."},{"id":"dep","vi":"đẹp","en":"beautiful","alt":"pretty","pack":"words","ex":["Đẹp quá!","So beautiful!"],"note":"Works on views, clothes, people, weather (trời đẹp), and days (một ngày đẹp trời)."},{"id":"qua-intensifier","vi":"quá","en":"so / too (after adjective)","pack":"words","ex":["Ngon quá! Đẹp quá! Nóng quá!","So tasty! So pretty! So hot!"],"note":"Adjective + quá = instant exclamation. The single highest-value grammar pattern for a beginner."},{"id":"rat","vi":"rất","en":"very (before adjective)","pack":"words","ex":["Rất ngon.","Very delicious."],"note":"rất goes BEFORE (rất ngon), quá goes AFTER with feeling (ngon quá!)."},{"id":"va","vi":"và","en":"and","pack":"words","ex":["Cà phê và bánh mì.","Coffee and a banh mi."]},{"id":"nhe","vi":"nhé","en":"okay? / softening particle","pack":"words","ex":["Không cay nhé!","Not spicy, okay?"],"note":"Turns requests friendly: Chờ một chút nhé. Hẹn gặp lại nhé! Sprinkle it on."},{"id":"bao-nhieu-tuoi","vi":"Bạn bao nhiêu tuổi?","en":"How old are you?","pack":"smalltalk","lit":"you how-many age?","ex":["Em bao nhiêu tuổi?","How old are you?"],"note":"Not rude in Vietnam — it's practically required, because age decides which pronouns you both use."},{"id":"toi-tuoi","vi":"Tôi … tuổi","en":"I'm … years old","pack":"smalltalk","ex":["Tôi hai mươi lăm tuổi.","I'm twenty-five years old."]},{"id":"de-thuong","vi":"dễ thương","en":"cute","alt":"adorable","pack":"smalltalk","lit":"easy to love","ex":["Em bé dễ thương quá!","What a cute baby!"]},{"id":"dep-trai","vi":"đẹp trai","en":"handsome","pack":"smalltalk","lit":"beautiful boy","ex":["Anh ấy đẹp trai quá!","He's so handsome!"],"note":"Street vendors will call you đẹp trai/xinh gái (pretty girl) to sell you things. It works."},{"id":"gioi-qua","vi":"Giỏi quá!","en":"So good (at something)! / impressive!","alt":"well done;skilled","pack":"smalltalk","ex":["Bạn nói tiếng Việt à? Giỏi quá!","You speak Vietnamese? Amazing!"],"note":"What everyone will say when you use any Vietnamese at all. Reply: Không, tôi mới học thôi — no, I'm just starting."},{"id":"troi-oi","vi":"Trời ơi!","en":"Oh my god!","alt":"omg;oh my","pack":"smalltalk","lit":"heavens!","ex":["Trời ơi, nóng quá!","Good lord, it's hot!"],"note":"The all-purpose exclamation of surprise, delight, or despair. You'll be saying it within a week."},{"id":"troi","vi":"trời","en":"sky / weather / heavens","pack":"smalltalk","ex":["Hôm nay trời đẹp.","The weather is nice today."],"note":"Trời does triple duty: the sky, the weather, and 'heavens!' in exclamations."},{"id":"gia-dinh","vi":"gia đình","en":"family","pack":"smalltalk","ex":["Gia đình bạn có mấy người?","How many people in your family?"],"note":"Family questions come early and warmly in Vietnamese small talk — they're friendliness, not nosiness."},{"id":"an-com-chua","vi":"Ăn cơm chưa?","en":"Have you eaten yet? (friendly greeting)","pack":"smalltalk","lit":"eat rice yet?","ex":["Chào em! Ăn cơm chưa?","Hey! Eaten yet?"],"note":"A greeting, not lunch logistics — like 'how are you?'. Standard answer: Rồi! (already) or Chưa! (not yet)."},{"id":"khong-co-chi","vi":"Không có chi!","en":"Don't mention it! (southern)","pack":"smalltalk","ex":["Cảm ơn nha! — Không có chi!","Thanks! — Don't mention it!"],"note":"Southern twin of không có gì. Hear it all over Saigon."},{"id":"cuu-toi-voi","vi":"Cứu tôi với!","en":"Help me!","alt":"help","pack":"emergency","ex":["Cứu tôi với!","Help!"],"note":"For real emergencies. For everyday help, say Giúp tôi với — 'give me a hand'."},{"id":"giup-toi","vi":"Giúp tôi với","en":"Please help me","alt":"can you help me","pack":"emergency","lit":"help me with","ex":["Anh ơi, giúp tôi với!","Excuse me, could you help me?"],"note":"với at the end makes it an appeal — 'come help me out'."},{"id":"cap-cuu","vi":"cấp cứu","en":"emergency / ambulance","pack":"emergency","lit":"urgent rescue","ex":["Gọi cấp cứu đi!","Call an ambulance!"],"note":"Emergency numbers in Vietnam: 113 police, 114 fire, 115 ambulance."},{"id":"cong-an","vi":"công an","en":"police","pack":"emergency","ex":["Đồn công an ở đâu?","Where is the police station?"],"note":"công an is the official term; you'll also hear cảnh sát."},{"id":"benh-vien","vi":"bệnh viện","en":"hospital","pack":"emergency","lit":"sickness institute","ex":["Cho tôi đến bệnh viện.","Take me to the hospital, please."]},{"id":"hieu-thuoc","vi":"hiệu thuốc","en":"pharmacy","alt":"drugstore;chemist","pack":"emergency","lit":"shop medicine","ex":["Gần đây có hiệu thuốc không?","Is there a pharmacy near here?"],"note":"Northern; nhà thuốc in the South. The green cross sign is universal. Pharmacists can handle most minor troubles."},{"id":"toi-bi-om","vi":"Tôi bị ốm","en":"I'm sick","alt":"ill;unwell","pack":"emergency","ex":["Hôm nay tôi bị ốm.","I'm sick today."],"note":"Northern; Southern says Tôi bị bệnh. bị marks that something bad happened to you."},{"id":"dau","vi":"đau","en":"to hurt / painful","alt":"pain;ache","pack":"emergency","ex":["Tôi bị đau bụng.","I have a stomachache."],"note":"đau + body part: đau đầu headache, đau bụng stomachache, đau họng sore throat."},{"id":"bac-si","vi":"bác sĩ","en":"doctor","pack":"emergency","ex":["Tôi cần gặp bác sĩ.","I need to see a doctor."]}]}
</script>
<script>

/* ============================== tones ============================== */

/* Base fields describe Hanoi (northern) speech; howS/pathS/dotS override

var TONES = {

  sac:   { vn: "sắc",  en: "rising",  mark: "rising mark (á)", cls: "t-sac",

    path: "M5,12 L23,4" },
  huyen: { vn: "huyền", en: "falling", mark: "falling mark (à)", cls: "t-huyen",

    path: "M5,6 L23,12" },
  hoi:   { vn: "hỏi",  en: "dipping", mark: "hook above (ả)", cls: "t-hoi",
    how: "Dip down, then swoop back up — like a doubtful “huh?” (In fast Hanoi speech it often just falls low.)",
    howS: "Start mid, dip down low, then swing back up — like a doubtful “huh?”",
