      var baseTry = composeResolve(mm[1]);
      if (baseTry && (baseTry.t === "food" || baseTry.t === "drink")) {
        return compFail(pat, "I can order “" + baseTry.vi + "”, but I don’t know how to say “" +
          kind + " " + mm[3].trim() + "” in Vietnamese, so I won’t guess.");
      }
    }
  }
  var num = 0, toks = s.split(" ");
  if (COMPOSE_NUM[toks[0]]) { num = COMPOSE_NUM[toks[0]]; toks.shift(); }
  var rest = toks.join(" ").replace(/^(?:the |a |an |some )/, "")
    .replace(/^(?:bowls?|cups?|glass(?:es)?|bottles?|portions?|servings?|orders?) of /, "");
  if (!strong && !num && !please && !togo && !mod) return null;
  var item = composeResolve(rest);
  if (!item) return (strong || num || togo || mod) ? failUnknown(pat, rest) : null;
  if (item.role.fixedOrder && num <= 1 && !togo && !mod) {
    return compOk(pat, item.role.fixedOrder.vi, item.role.fixedOrder.en,
      [compPiece("cho-toi", "cho tôi", "give me / let me"), slotPiece(item)],
      "A set phrase — the natural way to ask for this one.");
  }
  if (item.t !== "food" && item.t !== "drink")
    return failType(pat, item, "a dish or drink I know how to order");
  if (!num) num = 1;
  var clf = item.role.clf ? item.role.clf[accent()] : null;
  var vi = "Cho tôi " + COMPOSE_NUM_VI[num] + " " + (clf ? clf + " " : "") + item.vi +
    (togo ? " mang về" : "") +
    (mod ? ", " + (mod.kind === "no" ? "không" : "ít") + " " + mod.item.vi + " nhé" : "") + ".";
  var en = (num > 1 ? num + " × " + item.gloss : "One " + item.gloss) +
    (togo ? ", to go" : "") + (mod ? ", " + mod.kind + " " + mod.item.gloss : "") + ", please.";
  var pieces = [compPiece("cho-toi", "cho tôi", "give me / let me"), compPiece(COMPOSE_NUM_ENTRY[num])];
  if (clf) pieces.push({ id: null, vi: clf, gloss: "measure word (" + (accent() === "south" ? "southern" : "northern") + ")" });
  pieces.push(slotPiece(item));
  if (togo) pieces.push(compPiece("mang-ve"));
  if (mod) {
    pieces.push(mod.kind === "no" ? compPiece("khong") : { id: null, vi: "ít", gloss: "a little / less" });
    pieces.push(slotPiece(mod.item));
    pieces.push(compPiece("nhe"));
  }
  return compOk(pat, vi, en, pieces,
    "Cho tôi (“give me”) + amount + item is the standard polite way to order — no extra “please” needed.");
}

function composeEn(raw) {
  var c = canonEn(raw);
  if (c.length < 3) return null;
  var m, item, pat;

  /* Where is X? */
  if ((m = c.match(/^where(?: is| are| can i find)? (.+)$/))) {
    pat = "… ở đâu? (where is …?)";
    item = composeResolve(m[1]);
    if (!item) return failUnknown(pat, m[1]);
    if (item.t !== "place") return failType(pat, item, "a place");
    return compOk(pat, capFirst(item.vi) + " ở đâu?", "Where is the " + item.gloss + "?",
      [slotPiece(item), compPiece("o-dau", "ở đâu?", "at where?")],
      "Vietnamese names the thing first, then asks ở đâu (literally “at where?”) — the reverse of English.");
  }

  /* How long to X? */
  if ((m = c.match(/^how long(?: does it take| will it take)?(?: to get| to go)? to (.+)$/))) {
    pat = "Đi … mất bao lâu? (how long to …?)";
    item = composeResolve(m[1]);
    if (!item) return failUnknown(pat, m[1]);
    if (item.t !== "place") return failType(pat, item, "a place");
    return compOk(pat, "Đi " + item.vi + " mất bao lâu?",
      "How long does it take to get to the " + item.gloss + "?",
      [compPiece("di"), slotPiece(item), compPiece("bao-lau", "mất bao lâu?", "takes how long?")],
      "đi (go) + place + mất bao lâu (“takes how long?”).");
  }

  /* Take me to X */
  if ((m = c.match(/^(?:please )?(?:take|bring|drive) (?:me|us) to (.+?)(?: please)?$/))) {
    pat = "Cho tôi đến … (take me to …)";
    item = composeResolve(m[1]);
    if (!item) return failUnknown(pat, m[1]);
    if (item.t !== "place") return failType(pat, item, "a place");
    return compOk(pat, "Cho tôi đến " + item.vi + ".", "Take me to the " + item.gloss + ", please.",
      [compPiece("cho-toi", "cho tôi", "give me / let me"), compPiece("den"), slotPiece(item)],
      "Cho tôi đến… (“let me get to…”) is the standard polite taxi request.");
  }

  /* I want to go to X */
  if ((m = c.match(/^i (?:want|would like) to go to (.+)$/))) {
    pat = "Tôi muốn đi … (I want to go to …)";
    item = composeResolve(m[1]);
    if (!item) return failUnknown(pat, m[1]);
    if (item.t !== "place") return failType(pat, item, "a place");
    return compOk(pat, "Tôi muốn đi " + item.vi + ".", "I want to go to the " + item.gloss + ".",
      [compPiece("toi"), compPiece("muon"), compPiece("di"), slotPiece(item)], "");
  }

  /* Do you have X? / Is there X (near here)? */
  if ((m = c.match(/^(?:do you (?:guys )?have|have you got|got|is there|are there) (.+)$/))) {
    pat = "có … không? (do you have / is there …?)";
    var rest = m[1], near = false, nm = rest.match(/^(.*?)(?: near here| nearby| near by| around here| close by)$/);
    if (nm) { rest = nm[1]; near = true; }
    item = composeResolve(rest);
    if (!item) return failUnknown(pat, rest);
    if (item.t === "place" || near) {
      if (item.t !== "place") return failType(pat, item, "a place");
      return compOk(pat, "Gần đây có " + item.vi + " không?", "Is there a " + item.gloss + " near here?",
        [compPiece("gan", "gần đây", "near here"), compPiece("co-have"), slotPiece(item), compPiece("khong")],
        "The yes/no question wraps có … không (“exists … no?”) around the thing.");
    }
    if (item.t === "food" || item.t === "drink" || item.t === "thing" || item.t === "mass") {
      return compOk(pat, "Ở đây có " + item.vi + " không?", "Do you have " + item.gloss + " here?",
        [compPiece("o-day", "ở đây", "here"), compPiece("co-have"), slotPiece(item), compPiece("khong")],
        "có … không? wraps around the thing — literally “here has … no?”");
    }
    return failType(pat, item, "something I can ask about this way");
  }

  /* How much is X? */
  if ((m = c.match(/^how much(?: is| are| does| do| for)?(?: it)? (.+?)( cost)?$/))) {
    pat = "… bao nhiêu tiền? (how much is …?)";
    item = composeResolve(m[1]);
    if (!item) return failUnknown(pat, m[1]);
    if (item.t === "place" || item.t === "adj" || item.t === "addon")
      return failType(pat, item, "a thing you can put a price on");
    return compOk(pat, capFirst(item.vi) + " bao nhiêu tiền?", "How much is the " + item.gloss + "?",
      [slotPiece(item), compPiece("bao-nhieu-tien", "bao nhiêu tiền?", "how much money?")],
      "Thing first, then bao nhiêu tiền — the same order as … ở đâu?");
  }

  /* ordering */
  var order = composeOrder(c);
  if (order) return order;

  /* I want to eat/drink X */
  if ((m = c.match(/^i (?:want|would like)(?: to (eat|drink|have|try))? (.+)$/))) {
    pat = "Tôi muốn … (I want …)";
    item = composeResolve(m[2]);
    if (!item) return failUnknown(pat, m[2]);
    var eatable = item.t === "food" || item.t === "mass", drinkable = item.t === "drink";
    if (!eatable && !drinkable) return failType(pat, item, "a food or drink");
    if (m[1] === "eat" && drinkable)
      return compFail(pat, "“" + item.vi + "” is a drink — Vietnamese would uống (drink) it, not ăn (eat) it. Try “I want to drink " + item.gloss + "”.");
    if (m[1] === "drink" && eatable)
      return compFail(pat, "“" + item.vi + "” is food — Vietnamese would ăn (eat) it, not uống (drink) it. Try “I want to eat " + item.gloss + "”.");
    return compOk(pat, "Tôi muốn " + (drinkable ? "uống" : "ăn") + " " + item.vi + ".",
      "I want to " + (drinkable ? "drink" : "eat") + " " + item.gloss + ".",
      [compPiece("toi-muon", "tôi muốn", "I want"), compPiece(drinkable ? "uong" : "an"), slotPiece(item)],
      "muốn takes a verb: muốn ăn (want to eat), muốn uống (want to drink).");
  }

  /* I (don't) like / love X */
  if ((m = c.match(/^i (do not )?(?:really )?(like|love)(?: eating| drinking| to eat| to drink)? (.+)$/))) {
    pat = "Tôi thích … (I like …)";
    item = composeResolve(m[3]);
    if (!item) return failUnknown(pat, m[3]);
    if (item.t === "adj" || item.t === "addon")
      return failType(pat, item, "a thing (I can only build “I like” + a noun)");
    if (m[1]) return compOk(pat, "Tôi không thích " + item.vi + ".", "I don’t like " + item.gloss + ".",
      [compPiece("toi"), compPiece("khong"), compPiece("thich"), slotPiece(item)],
      "không before the verb makes it negative.");
    if (m[2] === "love") return compOk(pat, "Tôi rất thích " + item.vi + ".", "I really like " + item.gloss + ".",
      [compPiece("toi"), compPiece("rat"), compPiece("thich"), slotPiece(item)],
      "rất (very) in front of thích turns “like” into “really like”.");
    return compOk(pat, "Tôi thích " + item.vi + ".", "I like " + item.gloss + ".",
      [compPiece("toi"), compPiece("thich"), slotPiece(item)], "");
  }

  /* I'm (not/so) X */
  if ((m = c.match(/^i (?:am|feel) (not )?(so |very |really |too )?(.+)$/))) {
    pat = "Tôi … (I’m …)";
    item = composeResolve(m[3]);
    if (!item) return failUnknown(pat, m[3]);
    if (!(item.t === "adj" && item.role.feel))
      return failType(pat, item, "a feeling word I can safely put after Tôi");
    if (m[1]) return compOk(pat, "Tôi không " + item.vi + ".", "I’m not " + item.gloss + ".",
      [compPiece("toi"), compPiece("khong"), slotPiece(item)],
      "No “to be” needed — Tôi + adjective is a full sentence; không negates it.");
    if (m[2] && m[2].trim() === "very") return compOk(pat, "Tôi rất " + item.vi + ".", "I’m very " + item.gloss + ".",
      [compPiece("toi"), compPiece("rat"), slotPiece(item)],
      "No “to be” needed — Tôi + rất + adjective.");
    if (m[2]) return compOk(pat, "Tôi " + item.vi + " quá!", "I’m so " + item.gloss + "!",
      [compPiece("toi"), slotPiece(item), compPiece("qua-intensifier")],
      "No “to be” needed — and quá goes after the adjective.");
    return compOk(pat, "Tôi " + item.vi + ".", "I’m " + item.gloss + ".",
      [compPiece("toi"), slotPiece(item)],
      "No “to be” before adjectives — Tôi + adjective is a complete sentence.");
  }

  /* so X! / very X */
  if ((m = c.match(/^(so|too|very|really|super) (.+)$/))) {
    pat = "… quá! / rất … (so / very …)";
    item = composeResolve(m[2]);
    if (!item) return failUnknown(pat, m[2]);
    if (item.t !== "adj") return failType(pat, item, "a describing word");
    if (m[1] === "very") return compOk(pat, "Rất " + item.vi + ".", "Very " + item.gloss + ".",
      [compPiece("rat"), slotPiece(item)],
      "rất goes before the adjective; quá goes after it, with feeling.");
    return compOk(pat, capFirst(item.vi) + " quá!", "So " + item.gloss + "!",
      [slotPiece(item), compPiece("qua-intensifier")],
      "quá comes after the adjective — adjective + quá! is an instant exclamation.");
  }

  /* no X / not X — order add-ons */
  if ((m = c.match(/^(?:no|not|without) (.+)$/))) {
    pat = "không … (no / not …)";
    if (/^thanks?( you)?$/.test(m[1]))
      return compOk(pat, "Không, cảm ơn.", "No, thank you.",
        [compPiece("khong"), compPiece("cam-on")], "");
    item = composeResolve(m[1]);
    if (!item) return failUnknown(pat, m[1]);
    if (item.t !== "adj" && item.t !== "addon")
      return failType(pat, item, "a describing word or an add-on like ice or sugar");
    return compOk(pat, "không " + item.vi, "no " + item.gloss + " / not " + item.gloss,
      [compPiece("khong"), slotPiece(item)],
      "An order add-on, not a full sentence — tack it on: “…, không " + item.vi + " nhé.”");
  }

  /* less X */
  if ((m = c.match(/^(?:less|a little less|easy on the|light on the) (.+)$/))) {
    pat = "ít … (less …)";
    item = composeResolve(m[1]);
    if (!item) return failUnknown(pat, m[1]);
    if (!item.role.less) return failType(pat, item, "something orders usually dial down (spicy, sweet, ice, sugar)");
    return compOk(pat, "ít " + item.vi, "less " + item.gloss,
      [{ id: null, vi: "ít", gloss: "a little / less" }, slotPiece(item)],
      "An order add-on: “…, ít " + item.vi + " nhé.”");
  }

  return null;
}

/* Vietnamese-side recognition of the same patterns (needs accent marks —
   without them tones are ambiguous, and we don't guess) */
function composeViQ(raw) {
  composeItems();
  var q = String(raw).toLowerCase().replace(/[?!.…]+\s*$/, "").replace(/\s+/g, " ").trim();
  var m, item;
  if ((m = q.match(/^(.+?) ở đâu$/))) {
    item = COMPOSE_VI_LEX[m[1].trim()];
    if (!item) return null;
    return compOk("… ở đâu?", capFirst(item.vi) + " ở đâu?", "Where is the " + item.gloss + "?",
      [slotPiece(item), compPiece("o-dau", "ở đâu?", "at where?")],
      "Thing first, then ở đâu — you built it exactly right.");
  }
  if ((m = q.match(/^cho tôi (?:xin )?(?:(một|hai|ba|bốn|năm|sáu|bảy|tám|chín|mười) )?(.+)$/))) {
    var n = ({ "một": 1, "hai": 2, "ba": 3, "bốn": 4, "năm": 5, "sáu": 6, "bảy": 7, "tám": 8, "chín": 9, "mười": 10 })[m[1]] || 1;
    item = COMPOSE_VI_LEX[m[2].replace(/^(?:bát|tô|cốc|ly|chai|suất|phần|cái|quả|trái|đôi) /, "").trim()];
    if (!item || (item.t !== "food" && item.t !== "drink")) return null;
    var clf = item.role.clf ? item.role.clf[accent()] : null;
    return compOk("Cho tôi …", "Cho tôi " + COMPOSE_NUM_VI[n] + " " + (clf ? clf + " " : "") + item.vi + ".",
      (n > 1 ? n + " × " + item.gloss : "One " + item.gloss) + ", please.",
      [compPiece("cho-toi", "cho tôi", "give me"), compPiece(COMPOSE_NUM_ENTRY[n]), slotPiece(item)],
      "Cho tôi + amount + item — the standard way to order.");
  }
  if ((m = q.match(/^tôi muốn (?:(ăn|uống) )?(.+)$/))) {
    item = COMPOSE_VI_LEX[m[2].trim()];
    if (!item || (item.t !== "food" && item.t !== "drink" && item.t !== "mass")) return null;
    var drink = item.t === "drink";
    if (m[1] === "ăn" && drink)
      return compFail("Tôi muốn …", "“" + item.vi + "” is a drink — say Tôi muốn uống " + item.vi + " (uống = drink), not ăn (eat).");
    if (m[1] === "uống" && !drink)
      return compFail("Tôi muốn …", "“" + item.vi + "” is food — say Tôi muốn ăn " + item.vi + " (ăn = eat), not uống (drink).");
    return compOk("Tôi muốn …", "Tôi muốn " + (drink ? "uống" : "ăn") + " " + item.vi + ".",
      "I want to " + (drink ? "drink" : "eat") + " " + item.gloss + ".",
      [compPiece("toi-muon", "tôi muốn", "I want"), compPiece(drink ? "uong" : "an"), slotPiece(item)], "");
  }
  if ((m = q.match(/^rất (.+)$/))) {
    item = COMPOSE_VI_LEX[m[1].trim()];
    if (!item || item.t !== "adj") return null;
    return compOk("rất …", "Rất " + item.vi + ".", "Very " + item.gloss + ".",
      [compPiece("rat"), slotPiece(item)], "");
  }
  if ((m = q.match(/^(.+?) quá$/))) {
    item = COMPOSE_VI_LEX[m[1].trim()];
    if (!item || item.t !== "adj") return null;
    return compOk("… quá!", capFirst(item.vi) + " quá!", "So " + item.gloss + "!",
      [slotPiece(item), compPiece("qua-intensifier")], "");
  }
  if ((m = q.match(/^không (.+)$/))) {
    item = COMPOSE_VI_LEX[m[1].trim()];
    if (!item || (item.t !== "adj" && item.t !== "addon")) return null;
    return compOk("không …", "không " + item.vi, "no " + item.gloss + " / not " + item.gloss,
      [compPiece("khong"), slotPiece(item)],
      "An order add-on: “…, không " + item.vi + " nhé.”");
  }
  return null;
}

function composePhrase(raw) {
  if (!raw || !DICT.entries.length) return null;
  try {
    var r = isVietnameseText(raw) ? composeViQ(raw) : composeEn(raw);
    if (r) r.raw = String(raw).trim();
    return r;
  } catch (e) { return null; }
}

/* =========================== spaced repetition =========================== */

var MIN = 60 * 1000, DAY = 24 * 60 * 60 * 1000;
var LEARN_STEP = 10 * MIN;

function newCard(entryId, now) {
  return { id: entryId, added: now, state: "new", step: 0,
    ease: 2.5, ivl: 0, reps: 0, lapses: 0, due: now };
}

/* grade: 0 again · 1 hard · 2 good · 3 easy */
function rateCard(card, grade, now) {
  var c = card;
  c.reps += 1;
  if (c.state === "new") c.state = "learn";
  if (c.state === "learn") {
    if (grade === 0) { c.step = 0; c.due = now + LEARN_STEP; }
    else if (grade === 1) { c.due = now + LEARN_STEP; }
    else if (grade === 2) {
      if (c.step === 0) { c.step = 1; c.due = now + LEARN_STEP; }
      else { c.state = "review"; c.ivl = 1; c.due = now + DAY; }
    } else { c.state = "review"; c.ivl = 3; c.due = now + 3 * DAY; }
  } else { /* review */
    if (grade === 0) {
      c.lapses += 1; c.state = "learn"; c.step = 1;
      c.ease = Math.max(1.3, c.ease - 0.2);
      c.ivl = Math.max(1, Math.round(c.ivl * 0.3));
      c.due = now + LEARN_STEP;
    } else if (grade === 1) {
      c.ease = Math.max(1.3, c.ease - 0.15);
      c.ivl = Math.max(c.ivl + 1, Math.round(c.ivl * 1.2));
      c.due = now + c.ivl * DAY;
    } else if (grade === 2) {
      c.ivl = Math.max(c.ivl + 1, Math.round(c.ivl * c.ease));
      c.due = now + c.ivl * DAY;
    } else {
      c.ease += 0.15;
      c.ivl = Math.max(c.ivl + 2, Math.round(c.ivl * c.ease * 1.3));
      c.due = now + c.ivl * DAY;
    }
  }
  return c;
}

/* what would happen — for the little labels under Again/Hard/Good/Easy */
function previewIntervals(card, now) {
  return [0, 1, 2, 3].map(function (g) {
    var ghost = JSON.parse(JSON.stringify(card));
    rateCard(ghost, g, now);
    var delta = ghost.due - now;
    if (delta < 60 * MIN) return Math.round(delta / MIN) + "m";
    if (delta < 36 * 60 * MIN) return "1d";
    return Math.round(delta / DAY) + "d";
  });
}

function dueCards(cards, now, aheadMs) {
  var horizon = now + (aheadMs || 0);
  return Object.keys(cards).map(function (k) { return cards[k]; })
    .filter(function (c) { return c.due <= horizon; })
    .sort(function (a, b) {
      var la = a.state !== "review" ? 0 : 1, lb = b.state !== "review" ? 0 : 1;
      return la - lb || a.due - b.due;
    });
}

/* ============================== storage ============================== */

var KEY = "tungtu-v1";
var store = {
  data: null,
  load: function () {
    var fallback = { cards: {}, custom: {}, log: {}, settings: { dir: "ev", accent: "south" },
      lessons: { done: {} }, buddy: { seen: 0 } };
    try {
      var raw = localStorage.getItem(KEY);
      this.data = raw ? JSON.parse(raw) : fallback;
      if (!this.data.cards) this.data.cards = {};
      if (!this.data.custom) this.data.custom = {};
      if (!this.data.log) this.data.log = {};
      if (!this.data.settings) this.data.settings = { dir: "ev", accent: "south" };
      if (!this.data.settings.accent) this.data.settings.accent = "south";
      if (!this.data.lessons || !this.data.lessons.done) this.data.lessons = { done: {} };
      if (!this.data.buddy) this.data.buddy = { seen: 0 };
    } catch (e) { this.data = fallback; }
    return this.data;
  },
  save: function () {
    try { localStorage.setItem(KEY, JSON.stringify(this.data)); }
    catch (e) { /* storage full or blocked — keep running in memory */ }
  }
};

/* which accent the app is teaching: "south" (Saigon, default) or "north" (Hanoi) */
function accent() {
  return (store.data && store.data.settings && store.data.settings.accent) || "south";
}
var ACCENT_NAME = { south: "Saigon (southern)", north: "Hanoi (northern)" };
function accentShort() { return accent() === "south" ? "Saigon" : "Hanoi"; }

function dayKey(ts) {
  var d = new Date(ts);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") +
    "-" + String(d.getDate()).padStart(2, "0");
}

function logReview(now) {
  var k = dayKey(now);
  store.data.log[k] = (store.data.log[k] || 0) + 1;
  store.save();
}

function streakDays(log, now) {
  var n = 0, t = now;
  if (!log[dayKey(t)]) t -= DAY;           /* today not started yet? count from yesterday */
  while (log[dayKey(t)]) { n += 1; t -= DAY; }
  return n;
}

/* ============================== app state ============================== */

var DICT = { packs: [], entries: [] };
var INDEX = [];
var view = { tab: "today", packId: null, teachId: null, backTo: null,
  query: "", fullSearch: false, queue: [], current: null, revealed: false, sessionDone: 0,
  lesson: null, scen: null };

function allEntries() {

  return DICT.entries.concat(custom);
}
function entryById(id) {
  if (store.data.custom[id]) return store.data.custom[id];
  for (var i = 0; i < DICT.entries.length; i++) {
    if (DICT.entries[i].id === id) return DICT.entries[i];
  }
  return null;
}
function packById(id) {
  for (var i = 0; i < DICT.packs.length; i++) if (DICT.packs[i].id === id) return DICT.packs[i];
  return null;
}

/* ============================== helpers ============================== */

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }

var toastTimer = null;
function toast(msg) {
  var t = $("#toast");
  if (!t) return;
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.classList.remove("show"); }, 1900);
}

/* ============================== audio ============================== */

/* A genuine Vietnamese voice or nothing: an utterance with lang="vi-VN" but no
   vi voice installed gets read by the browser's default (English) voice, which
   mangles every tone. So: use a local vi-* voice if one exists, otherwise fetch
   real Vietnamese TTS from Google Translate, and on failure say so instead of
   mispronouncing. */

var viVoice = null, voiceChecked = false;
function pickVoice() {
  if (typeof speechSynthesis === "undefined") return null;
  var vs = speechSynthesis.getVoices() || [];
  for (var i = 0; i < vs.length; i++) {
    var lang = (vs[i].lang || "").toLowerCase().replace("_", "-");
    if (lang.indexOf("vi") === 0) return vs[i];
  }
  return null;
}
function localViVoice() {
  if (typeof speechSynthesis === "undefined") return null;
  if (!voiceChecked) {
    voiceChecked = true;
    viVoice = pickVoice();
    if (typeof speechSynthesis.onvoiceschanged !== "undefined") {
      speechSynthesis.onvoiceschanged = function () { viVoice = pickVoice(); };
    }
  }
  if (!viVoice) viVoice = pickVoice();
  return viVoice;
}

var ttsEl = null, ttsCache = {}, ttsCacheKeys = [], playToken = 0;
function stopSpeaking() {
  playToken++;
  if (typeof speechSynthesis !== "undefined") speechSynthesis.cancel();
  if (ttsEl) { ttsEl.pause(); ttsEl = null; }
}
function remoteTTSUrl(text, slow) {
  return "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=vi" +
    "&ttsspeed=" + (slow ? "0.24" : "1") + "&q=" + encodeURIComponent(text);
}
/* The TTS endpoint caps requests around 200 chars; split long text at
   punctuation/spaces and play the pieces back to back. */
function chunkText(text) {
  var parts = [], rest = text.trim(), seps = [". ", "! ", "? ", "; ", ", ", " "];
  while (rest.length > 190) {
    var cut = -1;
    for (var i = 0; i < seps.length && cut < 40; i++) cut = rest.lastIndexOf(seps[i], 189);
    if (cut < 40) cut = 189;
    parts.push(rest.slice(0, cut + 1).trim());
    rest = rest.slice(cut + 1).trim();
  }
  if (rest) parts.push(rest);
  return parts;
}
function speakLocal(text, slow, v) {
  var u = new SpeechSynthesisUtterance(text);
  u.voice = v;
  u.lang = v.lang || "vi-VN";
  u.rate = slow ? 0.6 : 0.92;
  speechSynthesis.speak(u);
}
function speakRemote(text, slow) {
  var chunks = chunkText(text), tok = playToken, idx = 0;
  function next() {
    if (tok !== playToken || idx >= chunks.length) return;
    var chunk = chunks[idx++];
    var key = (slow ? "s|" : "n|") + chunk;
    var a = ttsCache[key];
    if (!a) {
      a = new Audio(remoteTTSUrl(chunk, slow));
      a.preload = "auto";
      ttsCache[key] = a;
      ttsCacheKeys.push(key);
      if (ttsCacheKeys.length > 48) delete ttsCache[ttsCacheKeys.shift()];
    }
    a.onended = next;
    a.onerror = function () {
      delete ttsCache[key];
      if (tok !== playToken) return;
      var v = localViVoice();
      if (v) speakLocal(text, slow, v);
      else toast("Couldn't load Vietnamese audio — check your connection");
    };
    ttsEl = a;
    try { a.currentTime = 0; } catch (e) {}
    var p = a.play();
    if (p && typeof p.catch === "function") p.catch(function () {});
  }
  next();
}
function speak(text, slow) {
  stopSpeaking();
  var v = localViVoice();
  if (v) speakLocal(text, slow, v);
  else speakRemote(text, slow);
}

/* ---------------------------- Gemini lookup ---------------------------- */
/* Anything the phrasebook can't answer can be asked of Gemini — via a proxy
   that holds the API key, so the key never reaches this page. Two proxies
   speak the same protocol:
     · local dev:  `node server.js` in this folder (localhost)
     · deployed:   the Cloudflare Worker in worker.js — after
                   `npx wrangler deploy`, paste its URL into LOOKUP_DEPLOYED
                   below, keeping the /api/lookup path.
   Lookups try the likelier endpoint for where the page is running, then
   fall back to the other. */

var LOOKUP_LOCAL = "http://localhost:8787/api/lookup";
var LOOKUP_DEPLOYED = "https://tungtu-lookup.bennysimba.workers.dev/api/lookup"; /* e.g. "https://tungtu-lookup.YOUR-SUBDOMAIN.workers.dev/api/lookup" */
var LOOKUP_ENDPOINTS = (function () {
  var isLocal = typeof location === "undefined" || location.protocol === "file:" ||
    /^(localhost|127\.|192\.168\.|\[::1\])/.test(String(location.hostname || ""));
  return (isLocal ? [LOOKUP_LOCAL, LOOKUP_DEPLOYED] : [LOOKUP_DEPLOYED, LOOKUP_LOCAL])
    .filter(function (u) { return !!u; });
})();
var lookupToken = 0;

function geminiFootHTML(q) {
  return '<p class="hint" style="text-align:center;margin-top:14px">Not what you meant? ' +
    '<button class="link-btn" data-act="gemini-lookup" data-q="' + esc(q) + '" type="button">Ask Gemini about “' + esc(q) + '”</button></p>';
}

function geminiCardHTML(r) {
  var html = '<div class="card word-card stack">';
  html += '<div><p class="eyebrow">Gemini says — double-check anything important</p>' +
    '<div class="head-row"><div><h1 class="headword">' + esc(r.vi) + "</h1>" +
    '<p class="gloss">' + esc(r.en) + "</p>" +
    (r.literal ? '<p class="lit">literally: ' + esc(r.literal) + "</p>" : "") +
    "</div>" + audioBtnsHTML(r.vi) + "</div></div>";
  html += '<div><p class="eyebrow">Say it (' + accentShort() + " accent) — tap a tone to see how it moves</p>" +
    syllablesHTML(r.vi) + "</div>";
  if (r.note) html += '<div class="note-box">' + esc(r.note) + "</div>";
  html += '<div class="word-actions"><button class="btn primary" data-act="custom-card" data-vi="' +
    esc(r.vi) + '" data-en="' + esc(r.en) + '" type="button">Make it a flashcard</button></div></div>';
  return html;
}

function geminiErrorHTML(msg) {
  return '<div class="card stack"><p class="eyebrow">Gemini lookup didn\'t work</p>' +
    "<h3>" + esc(msg) + "</h3>" +
    '<p class="sub">The lookup runs through a small local server so the API key stays out of this page. ' +
    "Start it from the app folder with <strong>node server.js</strong> — setup lives in the README.</p></div>";
}

function geminiLookup(q) {
  q = String(q || "").trim();
  var box = $("#learn-results");
  if (!box || !q) return;
  var tok = ++lookupToken;
  box.innerHTML = '<div class="card empty">Asking Gemini about “' + esc(q) + '”…</div>';
  var finish = function (html) {
    if (tok !== lookupToken) return; /* a newer search took over */
    var b = $("#learn-results");
    if (b) b.innerHTML = html;
  };
  if (typeof fetch === "undefined") { finish(geminiErrorHTML("This browser has no fetch support.")); return; }
  var urls = LOOKUP_ENDPOINTS.slice();
  if (!urls.length) { finish(geminiErrorHTML("No lookup server is configured — see the README.")); return; }
  function attempt() {
    var url = urls.shift();
    fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: q })
    }).then(function (r) {
      return r.json().then(function (body) { return { ok: r.ok, body: body }; });
    }).then(function (r) {
      /* the server answered — success or a definitive error; don't retry elsewhere */
      if (!r.ok || r.body.error) finish(geminiErrorHTML(r.body.error || "The lookup server returned an error."));
      else if (!r.body.vi || !r.body.en) finish(geminiErrorHTML("Gemini's answer was missing pieces — try again."));
      else finish(geminiCardHTML(r.body));
    }).catch(function () {
      if (tok !== lookupToken) return;
      if (urls.length) attempt(); /* unreachable — fall back to the other proxy */
      else finish(geminiErrorHTML("Couldn't reach a lookup server."));
    });
  }
  attempt();
}

function showSearchResults(q, full) {
  var box = $("#learn-results");
  if (!box) return;
  if (!q || norm(q).length < 2) { box.innerHTML = ""; return; }
  var hits = searchEntries(INDEX, q);
  /* an exact phrasebook entry always wins; otherwise try building the phrase */
  var comp = (hits.length && hits[0].s >= 92) ? null : composePhrase(q);
  if (comp && comp.ok) { box.innerHTML = composedCardHTML(comp) + altHitsHTML(hits) + geminiFootHTML(q); return; }
  if (comp && full) { box.innerHTML = composeFailHTML(comp, hits) + geminiFootHTML(q); return; }
  if (hits.length === 0) { box.innerHTML = notFoundHTML(q, !!full); return; }
  box.innerHTML = hitListHTML(hits) + geminiFootHTML(q);
}

  view.query = q;
  view.teachId = null;
  view.fullSearch = true;
  if (norm(q).length < 1) return;
  var hits = searchEntries(INDEX, q);
  var comp = (hits.length && hits[0].s >= 92) ? null : composePhrase(q);
  if (!comp && hits.length > 0 && hits[0].s >= 62) view.teachId = hits[0].e.id;
  renderLearn();
}

/* ------------------------------ review tab ------------------------------ */

function buildQueue(now) {
  view.queue = dueCards(store.data.cards, now, 0).map(function (c) { return c.id; });
  view.sessionDone = 0;
}

/* strictly due + learning cards about to come back this session */
function pendingCount(now) {
  var strict = dueCards(store.data.cards, now, 0).length;
  var soonLearn = dueCards(store.data.cards, now, 15 * MIN).filter(function (c) {
    return c.state !== "review" && c.due > now;
  }).length;
  return strict + soonLearn;
}

function nextInQueue(now) {
  /* refresh: learning cards graded "again" come back within the session */
  var due = dueCards(store.data.cards, now, 0);
  var soon = dueCards(store.data.cards, now, 15 * MIN).filter(function (c) { return c.state !== "review"; });
  var pool = due.concat(soon.filter(function (c) {
    return !due.some(function (d) { return d.id === c.id; });
  }));
  return pool.length ? pool[0] : null;
}

function renderReview(practiceAhead) {
  var now = Date.now();
  var total = Object.keys(store.data.cards).length;
  if (total === 0) {
    $("#view").innerHTML = '<div class="card empty">Your deck is empty.<br><br>' +
      'Look something up in <button class="link-btn" data-goto="learn" type="button">Learn</button> or grab a starter set from ' +
      '<button class="link-btn" data-goto="packs" type="button">Packs</button> — then come back here to practice.</div>';
    return;
  }
  var card = nextInQueue(now);
  if (!card && practiceAhead) {
    var soonest = Object.keys(store.data.cards).map(function (k) { return store.data.cards[k]; })
      .sort(function (a, b) { return a.due - b.due; });
    card = soonest[0] || null;
  }
  if (!card) {
    var soonestAll = Object.keys(store.data.cards).map(function (k) { return store.data.cards[k]; })
      .sort(function (a, b) { return a.due - b.due; })[0];
    var when = soonestAll ? fmtWhen(soonestAll.due - now) : "";
    var doneLine = view.sessionDone
      ? pickLine(BUDDY_LINES.reviewDone).split("{n}").join(String(view.sessionDone))
      : pickLine(BUDDY_LINES.reviewNone);
    var streakNow = streakDays(store.data.log, now);
    if (view.sessionDone && STREAK_LINES[streakNow]) doneLine = STREAK_LINES[streakNow];
    $("#view").innerHTML = buddyHTML("cheer", esc(doneLine)) +
      '<div class="card done-banner celebrate stack" style="margin-top:14px">' +
      '<div class="big">Giỏi quá! 🎉</div>' +
      '<p class="sub">All caught up' + (view.sessionDone ? " — " + view.sessionDone + " reviewed" : "") +
      ".</p>" + (when ? '<p class="sub">Next card is due ' + when + ".</p>" : "") +
      '<div class="btn-row">' +
      (completedLessons().length ? '<button class="btn" data-act="scen-start" type="button">Practice a scene</button>' : "") +
      '<button class="btn" data-act="practice-ahead" type="button">Practice ahead anyway</button></div></div>';
    return;
  }
  view.current = card.id;
  var e = entryById(card.id);
  if (!e) { /* orphaned card (custom deleted) */
    delete store.data.cards[card.id]; store.save(); renderReview(); return;
  }
  var dir = store.data.settings.dir || "ev";
  var nDue = Math.max(1, pendingCount(now));
  var front, frontLabel;
  if (dir === "ev") { front = e.en; frontLabel = "Say it in Vietnamese"; }
  else { front = e.vi; frontLabel = "What does it mean?"; }

  var html = '<div class="card review-stage">' +
    '<div class="review-count">' + nDue + " to review · " +
    '<button class="link-btn" data-act="flip-dir" type="button" title="Switch question direction">' +
    (dir === "ev" ? "EN → VI" : "VI → EN") + " ⇄</button></div>" +
    '<p class="prompt-label">' + frontLabel + "</p>" +
    '<div class="prompt-main">' + esc(front) + "</div>";
  if (dir === "ve") html += '<div style="margin-top:6px">' + audioBtnsHTML(e.vi) + "</div>";

  if (!view.revealed) {
    html += '<div style="margin-top:22px"><button class="btn primary" data-act="reveal" type="button">Show answer</button></div>' +
      '<p class="hint" style="margin-top:14px">Try to say it out loud first — that\'s where it sticks.</p>';
  } else {
    html += '<div class="answer-zone stack">' +
      '<div class="head-row"><div><div class="prompt-main" style="margin:0">' + esc(e.vi) + "</div>" +
      '<p class="prompt-sub">' + esc(e.en) + "</p></div>" + audioBtnsHTML(e.vi) + "</div>" +
      syllablesHTML(e.vi) +
      (e.ex && e.ex[0] ? '<div class="example"><div class="ex-vi">' + esc(e.ex[0]) + '</div><div class="ex-en">' + esc(e.ex[1] || "") + "</div></div>" : "") +
      "</div>";
    var pv = previewIntervals(store.data.cards[e.id], now);
    var names = ["Again", "Hard", "Good", "Easy"];
    html += '<div class="grade-row">' + names.map(function (n, i) {
      return '<button class="grade-btn" data-grade="' + i + '" type="button">' +
        '<span class="g-label">' + n + '</span><span class="g-when">' + pv[i] + "</span></button>";
    }).join("") + "</div>" +
      '<p class="hint" style="margin-top:12px">Keys: space = show · 1–4 = grade</p>';
  }
  html += "</div>";
  $("#view").innerHTML = html;
}

function fmtWhen(ms) {
  if (ms <= 0) return "now";
  if (ms < 60 * MIN) return "in " + Math.max(1, Math.round(ms / MIN)) + " min";
  if (ms < DAY) return "in about " + Math.max(1, Math.round(ms / (60 * MIN))) + " h";
  return "in " + Math.round(ms / DAY) + " day" + (Math.round(ms / DAY) > 1 ? "s" : "");
}

function gradeCurrent(g) {
  var now = Date.now();
  var card = store.data.cards[view.current];
  if (!card) return;
  rateCard(card, g, now);
  logReview(now);
  store.save();
  view.sessionDone += 1;
  view.revealed = false;
  updateChrome();
  renderReview();
}

/* ------------------------------ packs tab ------------------------------ */

function renderPacks() {
  if (view.packId) return renderPackDetail(view.packId);
  var html = '<h2 class="hero-q">No phrase in mind? Start here.</h2><div class="pack-grid">';
  DICT.packs.forEach(function (p) {
    var entries = DICT.entries.filter(function (e) { return e.pack === p.id; });
    var got = entries.filter(function (e) { return deckHas(e.id); }).length;
    html += '<button class="pack-card" data-pack="' + p.id + '" type="button">' +
      '<span class="pack-name">' + esc(p.name) + "</span>" +
      '<span class="pack-desc">' + esc(p.desc) + "</span>" +
      '<span class="pack-meta">' + got + " of " + entries.length + " in your deck</span>" +
      '<span class="pack-bar"><i style="width:' + (entries.length ? Math.round(100 * got / entries.length) : 0) + '%"></i></span>' +

function renderPackDetail(packId) {
  var p = packById(packId);
  var entries = DICT.entries.filter(function (e) { return e.pack === packId; });
  var notIn = entries.filter(function (e) { return !deckHas(e.id); });
  var html = '<div class="page-head">' +
    '<button class="back-btn" data-act="packs-home" type="button" aria-label="Back to all packs">←</button>' +
    '<div class="ph-main"><h2>' + esc(p.name) + '</h2><p class="sub">' + esc(p.desc) + "</p></div>" +
    (notIn.length ? '<button class="btn small" data-act="add-pack" data-pack="' + packId + '" type="button">+ Add all (' + notIn.length + ")</button>" : '<span class="in-deck">✓ all</span>') +
    "</div>";
  html += '<div class="pack-list">' + entries.map(function (e) {
    var added = deckHas(e.id);

      '<button class="pr-main" data-teach-pack="' + esc(e.id) + '" type="button">' +

/* ------------------------------ progress tab ------------------------------ */

function renderProgress() {
  var now = Date.now();
  var cards = Object.keys(store.data.cards).map(function (k) { return store.data.cards[k]; });
  var due = dueCards(store.data.cards, now, 0).length;
  var mastered = cards.filter(function (c) { return c.ivl >= 21; }).length;
  var streak = streakDays(store.data.log, now);
  var totalReviews = Object.keys(store.data.log).reduce(function (a, k) { return a + store.data.log[k]; }, 0);

  var html = '<h2 class="hero-q">Your progress</h2>';
  html += '<div class="tile-row">' +
    tile(cards.length, "in your deck") + tile(due, "due now") +
    tile(mastered, "mastered (3wk+)") + tile(streak, streak === 1 ? "day streak" : "day streak") +
    "</div>";

  /* last 7 days of reviews */
  var days = [], maxV = 0;
  for (var i = 6; i >= 0; i--) {
    var ts = now - i * DAY;
    var v = store.data.log[dayKey(ts)] || 0;
    maxV = Math.max(maxV, v);
    days.push({ v: v, d: "SMTWTFS"[new Date(ts).getDay()], today: i === 0 });
  }
  html += '<div class="card chart-wrap" style="margin-top:14px">' +
    '<div class="chart-title">Reviews, last 7 days' + (totalReviews ? " · " + totalReviews + " all-time" : "") + "</div>" +
    '<div class="bars">' + days.map(function (d) {
      var h = maxV ? Math.max(4, Math.round(78 * d.v / maxV)) : 4;
      return '<div class="bar-col">' +
        '<span class="bar-v">' + (d.v || "") + "</span>" +
        '<span class="bar' + (d.v ? "" : " zero") + '" style="height:' + (d.v ? h : 3) + 'px" title="' + d.v + ' reviews"></span>' +
        '<span class="bar-d"' + (d.today ? ' style="font-weight:700"' : "") + ">" + d.d + "</span></div>";
    }).join("") + "</div><hr class=\"baseline\"></div>";

  /* tricky words */
  var tricky = cards.filter(function (c) { return c.lapses > 0; })
    .sort(function (a, b) { return b.lapses - a.lapses; }).slice(0, 5);
  if (tricky.length) {
    html += '<div class="card" style="margin-top:14px"><p class="eyebrow">Worth another look</p><div class="word-list-mini">' +
      tricky.map(function (c) {
        var e = entryById(c.id);
        if (!e) return "";
        return '<div class="wl-row"><span class="wl-vi">' + esc(e.vi) + '</span><span class="wl-stage">forgotten ' +
          c.lapses + "×</span></div>";
      }).join("") + "</div></div>";
  }
  if (cards.length) {
    var recent = cards.sort(function (a, b) { return b.added - a.added; }).slice(0, 5);
    html += '<div class="card" style="margin-top:14px"><p class="eyebrow">Recently added</p><div class="word-list-mini">' +
      recent.map(function (c) {
        var e = entryById(c.id);
        if (!e) return "";
        var stage = c.state === "review" ? "every " + c.ivl + "d" : "learning";
        return '<div class="wl-row"><span class="wl-vi">' + esc(e.vi) + '</span>' +
          '<span style="flex:1;color:var(--ink-2);font-size:13px">' + esc(e.en) + "</span>" +
          '<span class="wl-stage">' + stage + "</span></div>";
      }).join("") + "</div></div>";
  }
  html += '<p class="footnote" style="margin-top:22px"><button data-act="reset-all" type="button">Erase all progress</button></p>';
  $("#view").innerHTML = html;
}

function tile(num, label) {
  return '<div class="tile"><div class="t-num">' + num + '</div><div class="t-label">' + esc(label) + "</div></div>";
}

}
function lessonIndex(id) {
  for (var i = 0; i < CURRICULUM.length; i++) if (CURRICULUM[i].id === id) return i;
  return -1;
}
function firstIncompleteLesson() {
  for (var i = 0; i < CURRICULUM.length; i++) {
    if (!store.data.lessons.done[CURRICULUM[i].id]) return CURRICULUM[i];
  }
  return null;
}
function completedLessons() {
  return CURRICULUM.filter(function (l) { return !!store.data.lessons.done[l.id]; });
}
function lessonDoneToday(now) {
  var k = dayKey(now), done = store.data.lessons.done;
  for (var id in done) if (done.hasOwnProperty(id) && dayKey(done[id]) === k) return true;
  return false;
}

/* ---------------------------- lesson engine ---------------------------- */
/* view.lesson = { id, step, quiz, qi, missed, revealed, added }
   step 0 = scene intro · 1..N = one word each · N+1 = practice · N+2 = done */

function shuffleList(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function startLesson(id) {
  var l = lessonById(id);
  if (!l) return;
  view.lesson = { id: id, step: 0, quiz: null, qi: 0, missed: 0, revealed: false, added: 0 };
  view.scen = null;
  if (view.tab !== "today") setTab("today"); else render();
}

function buildQuiz(l) {
  var cues = {};
  (l.mission || []).forEach(function (m) { cues[m[1]] = m[0]; });
  return shuffleList(l.entries.slice()).map(function (id) {
    return { id: id, cue: cues[id] || null };
  });
}

function lessonNext() {
  var L = view.lesson;
  if (!L) return;
  var l = lessonById(L.id);
  L.step += 1;
  if (L.step === l.entries.length + 1) { L.quiz = buildQuiz(l); L.qi = 0; L.revealed = false; }
  render();
}

function lessonPrev() {
  var L = view.lesson;
  if (!L || L.step <= 0) return;
  L.step -= 1;
  render();
}

function quizAnswer(got) {
  var L = view.lesson;
  if (!L || !L.quiz || L.qi >= L.quiz.length) return;
  logReview(Date.now()); /* a real recall attempt — counts toward streak & chart */
  if (!got) { L.missed += 1; L.quiz.push(L.quiz[L.qi]); }
  L.qi += 1;
  L.revealed = false;
  if (L.qi >= L.quiz.length) finishLesson();
  else { updateChrome(); render(); }
}

function finishLesson() {
  var L = view.lesson, l = lessonById(L.id), now = Date.now();
  var added = 0;
  l.entries.forEach(function (id) { if (addToDeck(id, true)) added += 1; });
  var redo = !!store.data.lessons.done[l.id];
  store.data.lessons.done[l.id] = now;
  store.save();
  L.added = added;
  L.redo = redo;
  L.step = l.entries.length + 2;
  updateChrome();
  render();
}

/* shared chrome for lesson & scenario screens: progress + always-there exit */
function sessionBarHTML(fraction, exitAct) {
  var pct = Math.max(0, Math.min(100, Math.round(fraction * 100)));
  return '<div class="session-bar">' +
    '<div class="session-track"><i class="session-fill" style="width:' + pct + '%"></i></div>' +
    '<button class="session-x" data-act="' + exitAct + '" type="button" aria-label="Leave">×</button></div>';
}

function renderLesson() {
  var L = view.lesson, l = lessonById(L.id);
  if (!l) { view.lesson = null; renderToday(); return; }
  var N = l.entries.length;
  /* progress spans intro (0) → words (1..N) → practice (N+1) */
  var head = sessionBarHTML(Math.min(L.step, N + 1) / (N + 1), "lesson-exit") +
    '<p class="eyebrow session-eyebrow">Week ' + l.w + " · Day " + l.d + " — " + esc(l.title) + "</p>";
  var html = head;

  if (L.step === 0) {
    html += '<div class="card stack">' +
      "<h2>" + esc(l.title) + "</h2>" +
      '<div class="scene-banner">' + esc(l.scene) + "</div>" +
      '<p class="sub">' + N + " words & phrases, one quick practice run at the end — about five minutes.</p>" +
      '<div><button class="btn primary" data-act="lesson-next" type="button">Let\'s go</button></div>' +
      "</div>";
  } else if (L.step <= N) {
    var e = entryById(l.entries[L.step - 1]);
    html += e ? teachCardHTML(e, { embed: true }) : "";
    html += '<div class="session-nav">' +
      '<button class="btn ghost" data-act="lesson-prev" type="button">‹ Back</button>' +
      '<button class="btn primary" data-act="lesson-next" type="button">' +
      (L.step === N ? "Try the scene →" : "Next →") + "</button></div>";
  } else if (L.step === N + 1) {
    var item = L.quiz[L.qi], qe = entryById(item.id);
    html += '<div class="card review-stage">' +
      '<div class="review-count">practice · ' + (L.qi + 1) + " of " + L.quiz.length + "</div>";
    if (item.cue) {
      html += '<p class="prompt-label">Your moment</p>' +
        '<div class="prompt-main">' + esc(item.cue) + "</div>" +
        '<p class="prompt-sub">' + esc(qe.en) + "</p>";
    } else {
      html += '<p class="prompt-label">Say it in Vietnamese</p>' +
        '<div class="prompt-main">' + esc(qe.en) + "</div>";
    }
    if (!L.revealed) {
      html += '<div style="margin-top:22px"><button class="btn primary" data-act="quiz-reveal" type="button">Show answer</button></div>' +
        '<p class="hint" style="margin-top:14px">Say it out loud first — that\'s where it sticks.</p>';
    } else {
      html += '<div class="answer-zone stack">' +
        '<div class="head-row"><div><div class="prompt-main" style="margin:0">' + esc(qe.vi) + "</div>" +
        '<p class="prompt-sub">' + esc(qe.en) + "</p></div>" + audioBtnsHTML(qe.vi) + "</div>" +
        syllablesHTML(qe.vi) +
        (qe.ex && qe.ex[0] ? '<div class="example"><div class="ex-vi">' + esc(qe.ex[0]) + '</div><div class="ex-en">' + esc(qe.ex[1] || "") + "</div></div>" : "") +
        "</div>" +
        '<div class="quiz-check">' +
        '<button class="btn miss" data-act="quiz-miss" type="button">Not yet</button>' +
        '<button class="btn primary" data-act="quiz-got" type="button">Got it</button></div>';
    }
    html += "</div>";
  } else {
    var now = Date.now();
    var streak = streakDays(store.data.log, now);
    var line = STREAK_LINES[streak] ||
      (L.redo && L.added === 0 ? pickLine(BUDDY_LINES.lessonRedo)
        : pickLine(BUDDY_LINES.lessonDone).split("{n}").join(String(N)));
    var due = pendingCount(now);
    html = buddyHTML("cheer", esc(line)) +
      '<div class="card done-banner celebrate stack" style="margin-top:14px">' +
      '<div class="big">Xong rồi! 🎉</div>' +
      '<p class="sub">' + (L.added > 0
        ? L.added + (L.added === 1 ? " word" : " words") + " joined your deck — Review will bring them back right on time."
        : "All these words were already in your deck — pure extra reps.") + "</p>" +
      (L.missed > 0 ? '<p class="sub">The tricky ones will circle back — that\'s the system working, not you failing.</p>' : "") +
      '<div class="btn-row">' +
      '<button class="btn primary" data-act="lesson-exit" type="button">Back to Today</button>' +
      (due > 0 ? '<button class="btn" data-goto="review" type="button">Review ' + due + " due</button>" : "") +
      "</div></div>";
  }
  $("#view").innerHTML = html;
}

/* --------------------------- scenario practice --------------------------- */
/* Replays the mission lines of a completed lesson — reachable from Today
   and from the Review all-caught-up screen. view.scen = { id, qi, revealed, items } */

function startScenario(id) {
  var pool = completedLessons();
  if (!pool.length) return;
  var l = id ? lessonById(id) : pool[Math.floor(Math.random() * pool.length)];
  if (!l) return;
  var items = (l.mission && l.mission.length)
    ? shuffleList(l.mission.slice())
    : l.entries.map(function (eid) { return [null, eid]; });
  view.scen = { id: l.id, qi: 0, revealed: false, items: items };
  view.lesson = null;
  render();
}

      "The guides here keep the standard spelling-based endings — you'll be understood either way.</p>"
    : "<p><strong>đ</strong> = d (plain <strong>d</strong> is “z”!) · <strong>gi</strong> and <strong>r</strong> = “z” too · <strong>ph</strong> = f · <strong>x</strong> and <strong>s</strong> = s · " +
      "<strong>tr</strong> and <strong>ch</strong> = ch · <strong>kh</strong> = throaty k (Bach) · " +
      "<strong>ng</strong> = “ng” in <em>singing</em> — fine at the start of words · <strong>nh</strong> = “ny” in <em>canyon</em>.</p>";
  var nsPara = south
    ? "<p><strong>North vs South:</strong> you're learning Saigon (southern) pronunciation. In Hanoi, <strong>d/gi/r</strong> all sound like “z”, " +
      "<strong>s</strong> = plain s, <strong>tr</strong> = ch, and hỏi/ngã are two distinct tones. Everyone will understand you either way.</p>"
    : "<p><strong>North vs South:</strong> you're learning Hanoi (northern) pronunciation. In Saigon, <strong>d/gi</strong> sound like “y”, <strong>r</strong> like r, " +
      "<strong>s</strong> like “sh”, <strong>tr</strong> keeps its r-color, and the hỏi and ngã tones merge into one dipping tone. Everyone will understand you either way.</p>";
  var audioNote = south
    ? "<p><strong>About the audio:</strong> the ▸ play buttons use the only free Vietnamese voice on the web, and it speaks with a <em>Hanoi</em> accent — " +
      "you'll hear “z” where the guides say “y”, and it keeps hỏi and ngã distinct. The tones, vowels and rhythm still transfer; " +
      "where the audio and the written guide disagree (d, gi, r, s, tr, ngã), trust the written guide.</p>"
    : "";
  return '<div class="modal-head"><div><h2>The six tones</h2>' +
    '<p class="sub">Same letters, different melody, completely different word. ' +
    "The mark on the vowel tells you which melody to sing.</p>" +
    '<p class="sub" style="margin-top:6px">Showing <strong>' + ACCENT_NAME[accent()] + "</strong> pronunciation · " +
    '<button class="link-btn" data-act="flip-accent" type="button">switch to ' + (south ? "Hanoi" : "Saigon") + "</button></p></div>" +
    '<button class="modal-close" data-act="close-modal" aria-label="Close" type="button">×</button></div>' +
    '<div class="tone-table">' + rows + "</div>" +
    '<p class="sub" style="margin-top:14px"><button class="link-btn" data-say="ma, má, mà, mả, mã, mạ" type="button">▸ Hear all six in a row</button></p>' +
    '<hr class="divider">' +
    "<h3>Sounds that surprise English speakers</h3>" +
    '<div class="note-box" style="margin-top:8px">' +
    "<p><strong>ư</strong> — say “oo” but smile while you do it (lips flat). · <strong>ơ</strong> — “uh” as in “fur”, no r. · " +
    "<strong>â</strong> is a quick “uh”, <strong>ă</strong> a quick “ah”. · <strong>ê</strong> = “ay”, <strong>ô</strong> = “oh”, <strong>o</strong> = “aw”.</p>" +
    consonants + nsPara + audioNote +
    "</div>";
}

function customCardHTML(prefill) {
  return '<div class="modal-head"><div><h2>Make your own card</h2>' +
    '<p class="sub">Tones and pronunciation are worked out automatically from the Vietnamese spelling.</p></div>' +
    '<button class="modal-close" data-act="close-modal" aria-label="Close" type="button">×</button></div>' +
    '<form id="custom-form">' +
    '<div class="field"><label for="cf-vi">Vietnamese (with accent marks)</label>' +
    '<input id="cf-vi" required value="' + esc(prefill.vi || "") + '" placeholder="e.g. chúc mừng"></div>' +
    '<div class="field"><label for="cf-en">Meaning in English</label>' +
    '<input id="cf-en" required value="' + esc(prefill.en || "") + '" placeholder="e.g. congratulations"></div>' +
    '<div class="field"><label for="cf-note">Note to self (optional)</label>' +
    '<input id="cf-note" placeholder="where you heard it, who taught you…"></div>' +
    '<button class="btn primary" type="submit">Add to my deck</button></form>';
}

/* ------------------------------ chrome ------------------------------ */

function updateChrome() {
  var now = Date.now();
  var due = pendingCount(now);
  var badge = $("#due-badge");
  if (badge) badge.textContent = due > 0 ? String(due) : "";
  var ab = $("#accent-btn");
  if (ab) ab.textContent = "Accent: " + accentShort();
  var streak = streakDays(store.data.log, now);
  var chip = $("#streak-chip");
  if (chip) {
    if (streak > 0) {
      chip.hidden = false;
      chip.innerHTML = "<strong>" + streak + "</strong> day" + (streak > 1 ? "s" : "") + " in a row 🔥";
    } else chip.hidden = true;
  }
}

function setTab(tab) {
  view.tab = tab;
  view.revealed = false;
  view.scen = null;
  if (tab !== "packs") view.packId = null;
  $$(".nav-btn").forEach(function (b) {
    b.setAttribute("aria-selected", b.getAttribute("data-tab") === tab ? "true" : "false");
  });
  render();
}

function render() {
  updateChrome();
  if (view.scen) renderScenario();
  else if (view.tab === "today") renderToday();
  else if (view.tab === "learn") renderLearn();
  else if (view.tab === "review") renderReview(false);
  else if (view.tab === "packs") renderPacks();
  else renderProgress();
}

/* ------------------------------ actions ------------------------------ */

function addToDeck(entryId, silent) {
  if (store.data.cards[entryId]) return false;
  store.data.cards[entryId] = newCard(entryId, Date.now());
  store.save();
  updateChrome();
  if (!silent) toast("Added — it'll come up in Review");
  return true;
}

function handleClick(ev) {
  var el = ev.target.closest ? ev.target.closest("button") : null;
  if (!el) return;
  var act = el.getAttribute("data-act");

  if (el.hasAttribute("data-say")) { speak(el.getAttribute("data-say"), el.getAttribute("data-slow") === "1"); return; }
  if (el.hasAttribute("data-tab")) { setTab(el.getAttribute("data-tab")); return; }
  if (el.hasAttribute("data-goto")) { setTab(el.getAttribute("data-goto")); return; }
  if (el.hasAttribute("data-try")) {
    view.query = el.getAttribute("data-try");
    submitSearch(view.query);
    return;
  }
  if (el.hasAttribute("data-teach")) {
    view.teachId = el.getAttribute("data-teach");
    renderLearn();
    return;
  }
  if (el.hasAttribute("data-teach-pack")) {
    view.teachId = el.getAttribute("data-teach-pack");
    view.query = "";
    setTab("learn");
    return;
  }
  if (!act && el.hasAttribute("data-pack")) { view.packId = el.getAttribute("data-pack"); renderPacks(); return; }
  if (el.hasAttribute("data-add")) {
    addToDeck(el.getAttribute("data-add"));
    renderPacks();
    return;
  }
  if (el.hasAttribute("data-tone")) { openModal(toneGuideHTML()); return; }

  if (!act) return;
  switch (act) {
    case "add-card":
      addToDeck(el.getAttribute("data-id"));
      render();
      break;
    case "back":
      view.teachId = null;
      renderLearn();
      var inp = $("#search-input"); if (inp) inp.focus();
      break;
    case "tone-guide": openModal(toneGuideHTML()); break;
    case "close-modal": closeModal(); break;
    case "custom-card":
      openModal(customCardHTML({ vi: el.getAttribute("data-vi") || "", en: el.getAttribute("data-en") || "" }));
      var form = $("#custom-form");
      form.addEventListener("submit", function (e2) {
        e2.preventDefault();
        var vi = $("#cf-vi").value.trim(), en = $("#cf-en").value.trim(), note = $("#cf-note").value.trim();
        if (!vi || !en) return;
        var id = "c-" + Date.now();
        store.data.custom[id] = { id: id, vi: vi, en: en, pack: "custom", ex: null, note: note || null };
        store.save();
        rebuildIndex();
        addToDeck(id, true);
        closeModal();
        view.teachId = id; view.query = "";
        renderLearn();
        toast("Saved to your deck");
      });
      break;
    case "reveal": view.revealed = true; renderReview(false); break;
    case "open-lesson": startLesson(el.getAttribute("data-lesson")); break;
    case "lesson-exit": view.lesson = null; render(); break;
    case "lesson-next": lessonNext(); break;
    case "lesson-prev": lessonPrev(); break;
    case "quiz-reveal": if (view.lesson) { view.lesson.revealed = true; render(); } break;
    case "quiz-got": quizAnswer(true); break;
    case "quiz-miss": quizAnswer(false); break;
    case "scen-start": startScenario(el.getAttribute("data-lesson") || null); break;
    case "scen-reveal": if (view.scen) { view.scen.revealed = true; render(); } break;
    case "scen-next": scenNext(); break;
    case "scen-exit": view.scen = null; render(); break;
    case "gemini-lookup":
      view.teachId = null;
      geminiLookup(el.getAttribute("data-q") || view.query);
      break;
    case "flip-accent":
      store.data.settings.accent = accent() === "south" ? "north" : "south";
      store.save();
      if ($("#modal-root .tone-table")) openModal(toneGuideHTML());
      render();
      toast("Now teaching " + ACCENT_NAME[accent()] + " pronunciation");
      break;
    case "flip-dir":
      store.data.settings.dir = (store.data.settings.dir === "ve") ? "ev" : "ve";
      store.save();
      renderReview(false);
      break;
    case "practice-ahead": renderReview(true); break;
    case "add-pack":
      var pid = el.getAttribute("data-pack");
      var n = 0;
      DICT.entries.filter(function (e3) { return e3.pack === pid; }).forEach(function (e3) {
        if (addToDeck(e3.id, true)) n++;
      });
      toast("Added " + n + " cards");
      renderPacks();
      break;
    case "reset-all":
      if (typeof confirm === "undefined" || confirm("Erase your whole deck and all review history? This cannot be undone.")) {
        store.data = { cards: {}, custom: {}, log: {}, settings: { dir: "ev", accent: "south" },
          lessons: { done: {} }, buddy: { seen: 0 } };
        store.save();
        rebuildIndex();
        setTab("learn");
        toast("Fresh start");
      }
      break;
  }
  if (el.hasAttribute("data-grade")) { /* handled below */ }
}

function handleGrade(ev) {
  var el = ev.target.closest ? ev.target.closest(".grade-btn") : null;
  if (!el) return;
  gradeCurrent(parseInt(el.getAttribute("data-grade"), 10));
}

function handleKeys(ev) {
  if (view.tab !== "review" || view.scen || view.lesson) return;
  var tag = (ev.target.tagName || "").toLowerCase();
  if (tag === "input" || tag === "textarea") return;
  if (ev.key === " " && !view.revealed && view.current) {
    ev.preventDefault(); view.revealed = true; renderReview(false);
  } else if (view.revealed && ["1", "2", "3", "4"].indexOf(ev.key) >= 0) {
    gradeCurrent(parseInt(ev.key, 10) - 1);
  }
}

/* ------------------------------ boot ------------------------------ */

function boot() {
  var dataEl = document.getElementById("dict-data");
  DICT = JSON.parse(dataEl.textContent);
  store.load();
  rebuildIndex();
  var now = Date.now();
  if (store.data.buddy.seen) BUDDY_AWAY = Math.floor((now - store.data.buddy.seen) / DAY);
  store.data.buddy.seen = now;
  store.save();
  document.addEventListener("click", function (ev) { handleClick(ev); handleGrade(ev); });
  document.addEventListener("keydown", handleKeys);
  var tg = document.getElementById("tone-guide-link");
  if (tg) tg.addEventListener("click", function () { openModal(toneGuideHTML()); });
  setTab("today");
}

if (typeof document !== "undefined" && document.getElementById) {
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
}

/* expose internals for tests (harmless in browser) */
if (typeof module !== "undefined" && module.exports) {
  module.exports = { TONES, TONE_MAP, toneInfo, accent, store, detone, analyzeSyllable, analyzePhrase,
    isVietnameseText, norm, canonEn, buildIndex, searchEntries, newCard, rateCard,
    previewIntervals, dueCards, streakDays, respellRime, dayKey,
    composePhrase,
    CURRICULUM, WEEK_THEMES, lessonById, firstIncompleteLesson, completedLessons,
    lessonDoneToday, buddyGreeting, buddySVG, buddyHTML,
    startLesson, lessonNext, lessonPrev, quizAnswer, startScenario, scenNext,
    setTab, render, view, entryById, addToDeck,
    geminiLookup, geminiCardHTML, geminiErrorHTML, notFoundHTML, showSearchResults,
    _loadDict: function (d) { DICT = d; store.load(); rebuildIndex(); },
    _setAccent: function (a) { store.data.settings.accent = a; } };
}

</script>

</body>
